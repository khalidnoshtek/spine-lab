<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg0:#02030a;--bg1:#061b3a;--bg2:#08284f;
    --ink:#eaf2ff;--mut:#9fc0e8;--mut2:#6f93bd;--line:rgba(120,180,255,.16);

    --green:#34d399;--amber:#fbbf24;--orange:#fb923c;--red:#f87171;
    --card:rgba(8,20,40,.6);
  }
  html,body{height:100%}
  body{font-family:'Sora',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(125% 80% at 50% 4%,var(--bg2) 0%,var(--bg1) 34%,#020c1e 64%,var(--bg0) 100%);overflow:hidden}
  #app{position:relative;width:100%;max-width:430px;height:100dvh;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
  ::-webkit-scrollbar{width:0;height:0}

  /* top chrome */
  .hud{flex:none;padding:15px 20px 8px;display:flex;align-items:center;gap:10px}
  .hud .bk{background:rgba(10,28,56,.6);border:1px solid var(--line);color:#bcd4f0;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex:none;display:none}
  .hud .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .hud .logo svg{filter:drop-shadow(0 0 8px rgba(95,208,255,.5))}
  .hud .cert{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);padding:4px 9px;border-radius:99px;font-weight:600}
  .hud .pts{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);padding:4px 11px;border-radius:99px}
  .prog{flex:none;height:3px;margin:2px 20px 0;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  .prog i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--indigo));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .steplbl{flex:none;padding:8px 20px 0;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);display:flex;justify-content:space-between}

  .scroll{flex:1;overflow-y:auto;padding:8px 20px 150px;-webkit-overflow-scrolling:touch}
  .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan);font-weight:600}
  h1.q{font-size:23px;font-weight:600;line-height:1.18;margin-top:6px;letter-spacing:-.2px}
  p.sub{font-size:13px;color:var(--mut);line-height:1.5;margin-top:8px}
  .lumbar{color:var(--gold);font-weight:600}

  .foot{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--bg0) 58%,transparent)}
  .cta{width:100%;border:0;border-radius:16px;padding:16px;font-family:inherit;font-size:15.5px;font-weight:700;color:#02121f;cursor:pointer;background:linear-gradient(120deg,var(--cyan),var(--indigo));display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,filter .2s}
  .cta:active{transform:scale(.985)} .cta:disabled{opacity:.4;cursor:not-allowed}
  .cta.sec{background:transparent;color:var(--mut);border:1px solid var(--line);margin-top:9px}

  /* form lock overlay */
  .locked{position:relative}

  .gatewrap.gated{filter:blur(5px);opacity:.45;pointer-events:none;user-select:none}

  /* video card / player */
  .vcard{margin-top:16px;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 13px;cursor:pointer;transition:border-color .2s}
  .vcard:active{border-color:var(--cyan)}
  .vcard .thumb{position:relative;width:48px;height:62px;flex:none;border-radius:10px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0,#0d3a6e,#04132b)}

  .vcard .meta b{display:block;font-size:13px;font-weight:600} .vcard .meta span{font-size:11px;color:var(--mut2)}

  .pmask{position:fixed;inset:0;z-index:60;background:rgba(2,8,20,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:18px}
  .pmask.show{display:flex}
  .pwrap{width:100%;max-width:300px}
  .pscreen{position:relative;width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;background:radial-gradient(120% 80% at 50% 6%,#0d3a6e,#04132b 72%);border:1px solid var(--line)}
  .pscreen iframe{width:100%;height:100%;border:0;display:block}
  .pscreen .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 22px}
  .pscreen .ph img{width:46px;opacity:.85;margin-bottom:13px;filter:drop-shadow(0 0 16px rgba(95,208,255,.5))}
  .pscreen .ph .pt{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
  .pscreen .ph h3{font-size:16px;font-weight:600;margin:6px 0 9px} .pscreen .ph p{font-size:12px;color:#c2d6ef;line-height:1.5}
  .pbar{height:3px;border-radius:99px;background:rgba(255,255,255,.14);margin:12px 2px 0;overflow:hidden}.pbar i{display:block;height:100%;width:0;background:var(--cyan);transition:width .1s linear}
  .ptime{text-align:center;font-size:10.5px;color:var(--mut2);margin-top:7px}

  /* inputs */
  .field{margin-top:14px}.field label{font-size:12px;color:var(--mut)}
  .field input,.field select{width:100%;margin-top:6px;background:rgba(10,26,50,.6);border:1px solid var(--line);border-radius:13px;padding:13px 14px;color:#fff;font-family:inherit;font-size:15px;outline:none}
  .field input:focus{border-color:var(--cyan)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chips{display:grid;gap:9px;margin-top:14px}.chips.two{grid-template-columns:1fr 1fr}
  .chip{border:1px solid var(--line);background:rgba(12,28,54,.6);color:#cfe0f5;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .16s}
  .chip b{display:block;font-size:11.5px;color:var(--mut2);font-weight:500;margin-top:3px}
  .chip.on{border-color:var(--cyan);background:linear-gradient(135deg,rgba(56,189,248,.2),rgba(56,189,248,.04));color:#fff}.chip.on b{color:var(--cyan)}
  .faces{display:flex;justify-content:space-between;gap:6px;margin-top:18px}
  .face{flex:1;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:14px;padding:10px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
  .face svg{width:28px;height:28px}.face span{font-size:12px;font-weight:600;color:var(--mut)}.face.on{transform:translateY(-3px)}
  .vaslbl{text-align:center;margin-top:14px;font-size:14px;font-weight:600}
  .odi{margin-top:16px;display:grid;gap:8px}.odirow{display:grid;grid-template-columns:1.1fr 2fr;align-items:center;gap:10px}.odirow .n{font-size:13.5px;color:#dbe8fa}
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .seg button{border:1px solid var(--line);background:rgba(12,28,54,.55);color:var(--mut);border-radius:10px;padding:9px 2px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .14s}
  .seg button.on{color:#02121f}.seg button.g.on{background:var(--green);border-color:var(--green)}.seg button.a.on{background:var(--amber);border-color:var(--amber)}.seg button.r.on{background:var(--red);border-color:var(--red);color:#fff}
  .odisum{margin-top:12px;text-align:center;font-size:12.5px;color:var(--mut)}
  .flags{margin-top:14px;display:grid;gap:7px}
  .flag{display:flex;align-items:center;gap:11px;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:12px;padding:11px 13px;cursor:pointer;font-size:13px;transition:all .15s}
  .flag .bx{width:20px;height:20px;flex:none;border-radius:6px;border:1.5px solid var(--mut2);display:grid;place-items:center;font-size:12px;color:#02121f}
  .flag.on{border-color:var(--red);background:rgba(248,113,113,.12)}.flag.on .bx{background:var(--red);border-color:var(--red)}
  .warn{margin-top:12px;display:flex;gap:9px;align-items:flex-start;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);border-radius:13px;padding:12px 13px;font-size:12px;color:#ffd2d2;line-height:1.5}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px}

  /* device */
  .dev{display:flex;align-items:center;gap:13px;border:1px solid var(--line);background:rgba(12,28,54,.55);border-radius:14px;padding:14px;cursor:pointer;margin-top:10px;transition:all .15s}
  .dev .di{font-size:22px;width:30px;text-align:center}.dev b{font-size:14px}.dev span{font-size:11.5px;color:var(--mut2);display:block}.dev .arr{margin-left:auto;color:var(--mut2)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .synced{display:flex;align-items:center;gap:6px;color:var(--green);font-size:12.5px;font-weight:600;margin:14px 0 4px}
  .srow{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}.srow .k{color:var(--mut)}.srow .v{color:#fff;font-weight:600}

  /* habit cards (with pose visuals) */
  .habit{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-top:10px}
  .habit .pic{width:46px;height:60px;flex:none;border-radius:11px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0,#0d3a6e,#04132b);display:grid;place-items:end center}
  .habit .pic img{height:58px;width:auto;filter:drop-shadow(0 0 10px rgba(95,208,255,.4))}
  .habit .hb{flex:1}
  .habit .top{display:flex;justify-content:space-between;align-items:baseline}.habit .top b{font-size:15px}.habit .top .v{font-size:13px;color:var(--mut)}.habit .top .v b{color:#fff;font-size:16px}
  .habit .bar{height:6px;border-radius:99px;background:rgba(255,255,255,.08);margin-top:8px;overflow:hidden}.habit .bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .habit .goal{font-size:10.5px;color:var(--mut2);margin-top:5px}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:99px;outline:none;margin-top:9px;background:linear-gradient(90deg,var(--cyan) var(--p,0%),rgba(255,255,255,.1) var(--p,0%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(95,208,255,.7);cursor:pointer}

  /* hero */
  .hero{position:relative;display:flex;justify-content:center;margin:4px 0 0}
  .hero img{height:280px;width:auto;filter:drop-shadow(0 10px 40px rgba(0,40,90,.6))}
  .hero .lumglow{position:absolute;left:50%;top:54%;width:130px;height:115px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,var(--gold),transparent 62%);opacity:.55;filter:blur(6px);mix-blend-mode:screen;transition:background .5s,opacity .5s}

  /* results / home cards */
  .ring{display:grid;place-items:center;position:relative;margin:6px 0}
  .ring .num{position:absolute;text-align:center}.ring .num b{font-size:44px;font-weight:800;letter-spacing:-1px}.ring .num span{display:block;font-size:9.5px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:14px}
  .card h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2);font-weight:600}
  .mgmt{margin-top:14px;border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.5}
  .bd{margin-top:12px;display:grid;gap:7px}.bd .b{display:flex;align-items:center;font-size:12.5px;gap:10px}.bd .b .n{flex:1;color:var(--mut)}.bd .b .v{color:#fff;font-weight:600}
  .trust{margin-top:18px;text-align:center;font-size:11.5px;color:var(--mut2);line-height:1.6;border-top:1px solid var(--line);padding-top:14px}
  .trust a{color:var(--cyan);text-decoration:none}.trust .by{color:#fff;font-weight:600}
  .disc{margin-top:10px;font-size:10.5px;color:var(--mut2);text-align:center;line-height:1.5}

  /* home */
  .greet{font-size:13px;color:var(--mut)}.greet b{display:block;color:#fff;font-size:22px;font-weight:600;margin-top:2px}
  .scorecard{display:flex;align-items:center;gap:16px;margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}
  .scorecard .mini{position:relative;width:78px;height:78px;flex:none}
  .scorecard .mini .n{position:absolute;inset:0;display:grid;place-items:center;font-size:26px;font-weight:800}
  .scorecard .info b{font-size:15px}.scorecard .info .band{font-size:12px;font-weight:700;margin-top:2px}.scorecard .info p{font-size:11.5px;color:var(--mut2);margin-top:4px;line-height:1.4}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px}.stat .k{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.5px}.stat .v{font-size:22px;font-weight:700;margin-top:4px}.stat .v small{font-size:12px;color:var(--mut);font-weight:500}
  .syncbtn{margin-top:12px}
  .spark{display:flex;align-items:flex-end;gap:5px;height:46px;margin-top:12px}.spark i{flex:1;border-radius:4px 4px 2px 2px;background:linear-gradient(180deg,var(--cyan),#0e7490);opacity:.85}

  /* rewards */
  .ptbig{text-align:center;margin-top:8px}.ptbig b{font-size:44px;font-weight:800;color:var(--cyan)}.ptbig span{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2)}
  .reward{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-top:10px}
  .reward .ic{font-size:24px;width:40px;height:40px;flex:none;display:grid;place-items:center;border-radius:11px;background:rgba(56,189,248,.12)}
  .reward .rb{flex:1}.reward .rb b{font-size:14px}.reward .rb span{font-size:11.5px;color:var(--mut2);display:block;margin-top:1px}
  .reward .rc{flex:none;border:0;border-radius:11px;padding:9px 13px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(120deg,var(--cyan),var(--indigo));color:#02121f}
  .reward .rc:disabled{background:rgba(255,255,255,.08);color:var(--mut2);cursor:not-allowed}
  .reward.got{opacity:.7}.reward.got .rc{background:rgba(52,211,153,.18);color:var(--green)}

  /* tab bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(4,12,28,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .tabbar button{background:0;border:0;color:var(--mut2);font-family:inherit;font-size:10.5px;font-weight:600;padding:11px 0 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
  .tabbar button .ti{font-size:19px}.tabbar button.on{color:var(--cyan)}

  /* toast */
  .toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:80;opacity:0;display:flex;align-items:center;gap:8px;background:rgba(56,189,248,.16);border:1px solid rgba(95,208,255,.5);color:var(--cyan);font-weight:700;font-size:13px;padding:8px 15px;border-radius:99px;backdrop-filter:blur(8px);pointer-events:none;transition:all .35s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="pmask" id="pmask"><div class="pwrap">
  <div class="pscreen" id="pscreen"></div>
  <div class="pbar"><i id="pbar"></i></div>
  <div class="ptime" id="ptime">0:00 / 0:05</div>
  <button class="cta" id="pdone" disabled style="margin-top:12px">Watch to continue</button>
</div></div>

<script>
/* ════════════ BackSignal — grounded in Dr Ayush Sharma's SSS (lumbar only) ════════════ */
const APP = {
  doctor:'Dr Ayush Sharma',
  links:{ website:'https://example.com', research:'https://example.com', youtube:'https://youtube.com' },
  videos:{ // paste vertical YouTube IDs; empty id → script placeholder. All clips 5s gate.
    intro:{id:'',title:'Why your lower back matters',script:'Most lower-back pain is built slowly — by how you sit, move and sleep. BackSignal turns your habits and symptoms into one Spine Severity Score, then tracks you daily.'},
    vas:{id:'',title:'Rating your pain',script:'Pain is the body’s signal. Pick the face that matches your lower back right now.'},
    sciatica:{id:'',title:'Leg pain & sciatica',script:'Pain or numbness travelling down the leg can mean an irritated nerve in the lower back.'},
    odi:{id:'',title:'How it affects your day',script:'We measure disability the way spine clinics do — across walking, sitting, standing, sleep and daily activities.'},
    bmi:{id:'',title:'Body load on the spine',script:'Extra body weight increases mechanical load on the lumbar discs. Your BMI adds a small weighting.'},
    chronicity:{id:'',title:'How long it’s lasted',script:'Pain past six weeks behaves differently to a fresh strain — duration changes what we recommend.'},
    redflag:{id:'',title:'A quick safety check',script:'A few symptoms can signal something serious needing urgent care. We always screen for these first.'},
  },
}
const REWARDS=[
  {id:'guide',ic:'📘',name:'Lower-back care guide (PDF)',cost:150,desc:'Dr-approved daily routine'},
  {id:'cushion',ic:'🪑',name:'Posture cushion — 20% off',cost:400,desc:'Partner discount code'},
  {id:'physio',ic:'🧑‍⚕️',name:'Free physio screening',cost:700,desc:'15-min online session'},
  {id:'coach',ic:'🎥',name:'1:1 with a spine coach',cost:1200,desc:'Personalised video call'},
  {id:'pro',ic:'⭐',name:'BackSignal Pro — 1 month',cost:1000,desc:'Advanced tracking & insights'},
]
const TARGETS={ sitting:7, walking:45, exercise:20, sleep:7.5 } // daily goals
const POSE={ sitting:'assets/sit.webp', walking:'assets/walk.webp', exercise:'assets/lift.webp', sleep:'assets/sleep.webp' }

/* ── persistent state ── */
const KEY='backsignal_v1'
const todayStr=()=>new Date().toISOString().slice(0,10)
let S = load()
function load(){ try{const s=JSON.parse(localStorage.getItem(KEY)); if(s)return s}catch(e){}
  return { onboarded:false, points:0, streak:0, lastSync:null, device:null, redeemed:[],
    profile:null, today:null, history:[], planDone:[] } }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){} }

/* onboarding working data */
let D = { age:35,sex:'',occupation:'',height:170,weight:72,vas:null,sciatica:null,
  odi:{Walking:0,Sitting:0,Standing:0,Sleep:0,'Daily activities':0},chronicity:null,redflags:[],
  habits:{sitting:8,walking:30,exercise:2,sleep:7} }
let watched={}

/* ── SSS scoring (exact to chart) ── */
const bmiOf=(w,h)=>w/Math.pow(h/100,2)
const bmiScore=()=>{const b=bmiOf(D.weight,D.height);return b<25?0:b<30?1:2}
const vasPoints=()=>D.vas==null?0:D.vas<=3?0:D.vas<=6?1:2
const odiTotal=()=>Object.values(D.odi).reduce((a,b)=>a+b,0)
const odiPoints=()=>{const t=odiTotal();return t<=2?0:t<=5?1:2}
const chronScore=()=>({acute:0,subacute:1,chronic:2})[D.chronicity]??0
const hasRedFlag=()=>D.redflags.length>0
const sssTotal=()=>hasRedFlag()?11:vasPoints()+(D.sciatica||0)+odiPoints()+bmiScore()+chronScore()
function severity(t){
  if(hasRedFlag()||t>=10)return{band:'SEVERE / HIGH RISK',color:'var(--red)',hex:'#f87171',desc:'Severe symptoms with possible serious pathology.',mgmt:'Urgent spine-specialist evaluation / advanced care.'}
  if(t>=7)return{band:'MODERATE–SEVERE',color:'var(--orange)',hex:'#fb923c',desc:'Moderate-to-severe pain and disability; marked limitation.',mgmt:'Spine specialist consultation and advanced care.'}
  if(t>=4)return{band:'MILD–MODERATE',color:'var(--amber)',hex:'#fbbf24',desc:'Mild-to-moderate pain with some functional limitation.',mgmt:'Physiotherapy, lifestyle correction and evaluation.'}
  return{band:'LOW',color:'var(--green)',hex:'#34d399',desc:'Minimal pain and low impact on your day.',mgmt:'Education, posture correction and regular exercise.'}
}

/* ── points / toast ── */
const toastEl=document.getElementById('toast')
function award(n,label){ S.points+=n; save(); toastEl.innerHTML=`✦ +${n} <span style="opacity:.8;font-weight:500">${label}</span>`;
  toastEl.classList.add('show'); clearTimeout(award._t); award._t=setTimeout(()=>toastEl.classList.remove('show'),1700) }

/* ── video player (5s gate) ── */
const pmask=document.getElementById('pmask'),pscreen=document.getElementById('pscreen'),pbar=document.getElementById('pbar'),pdone=document.getElementById('pdone'),ptime=document.getElementById('ptime')
let ptimer=null,pcb=null
function videoCard(key,id){ const v=APP.videos[key]; const done=watched[id||key];
  return `<div class="vcard ${done?'done':''}" data-vid="${key}" data-vk="${id||key}">
    <div class="thumb"><div class="pl">▶</div></div>
    <div class="meta"><b>${v.title}</b><span>${done?'Watched ✓':'Why we ask · 0:05'}</span></div>
    <div class="yt">${done?'✓':'▶ Watch'}</div></div>` }
function openVideo(key,wkey,onDone){
  const v=APP.videos[key]; pcb=onDone||null; clearInterval(ptimer); pbar.style.width='0%'; ptime.textContent='0:00 / 0:05'
  pdone.disabled=true; pdone.textContent='Watch to continue'
  if(v.id){ pscreen.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1&playsinline=1&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>` }
  else{ pscreen.innerHTML=`<div class="ph"><img src="assets/stand.webp" alt=""/><div class="pt">${APP.doctor} · Spine Lab</div><h3>${v.title}</h3><p>${v.script}</p></div>` }
  pmask.classList.add('show')
  let p=0; ptimer=setInterval(()=>{ p+=0.1; const f=Math.min(1,p/5); pbar.style.width=f*100+'%'; ptime.textContent='0:0'+Math.min(5,Math.floor(p))+' / 0:05'
    if(f>=1){ clearInterval(ptimer); pdone.disabled=false; pdone.textContent='Continue ✓' } },100)
  pmask.dataset.wk=wkey||key
}
pdone.onclick=()=>{ if(pdone.disabled)return; clearInterval(ptimer); pmask.classList.remove('show')
  const wk=pmask.dataset.wk; if(!watched[wk]){ watched[wk]=true; award(10,'Watched') } const cb=pcb; pcb=null; if(cb)cb() }

/* ── faces ── */
function face(v){ const cols=['#34d399','#7dd37d','#fbbf24','#fb923c','#f87171','#ef4444']; const c=cols[v/2]
  const mouth=v<=2?'M8 16q4 3 8 0':v<=4?'M8 16h8':v<=6?'M8 17q4 -1 8 0':'M8 18q4 -4 8 0'
  return `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="${c}" stroke-width="1.8"/><circle cx="8.5" cy="10" r="1.1" fill="${c}"/><circle cx="15.5" cy="10" r="1.1" fill="${c}"/><path d="${mouth}" stroke="${c}" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>` }

/* ════════════ FLOW ENGINE (onboarding) ════════════ */
let idx=0
const root=document.getElementById('app')
function shell(inner){ return `<div class="hud"><button class="bk" id="bk">‹</button><div class="logo"><svg width="22" height="22" viewBox="0 0 24 24"><g fill="#6fe0ff"><rect x="9" y="3" width="6" height="2.4" rx="1.2"/><rect x="8.4" y="6.4" width="7.2" height="2.6" rx="1.3"/><rect x="8.1" y="9.8" width="7.8" height="2.7" rx="1.35"/><rect x="8.1" y="13.2" width="7.8" height="2.7" rx="1.35"/></g><g fill="#ffb020"><rect x="9" y="16.8" width="6" height="2.5" rx="1.25"/><rect x="9" y="20" width="6" height="2.4" rx="1.2"/></g></svg>BackSignal</div><div class="cert" id="certpts">✚ Doctor-verified</div></div><div class="prog"><i id="prog"></i></div><div class="steplbl"><span id="lblL"></span><span id="lblR"></span></div><div class="scroll" id="scroll">${inner}</div><div class="foot" id="foot"></div>` }
const $=id=>document.getElementById(id)
function setFoot(){ const s=STEPS[idx]; const gated=s.video&&!watched[s.id]; const label=typeof s.cta==='function'?s.cta():s.cta
  const dis=gated||(s.canNext&&!s.canNext()); $('foot').innerHTML=`<button class="cta" id="cta" ${dis?'disabled':''}>${label}${s.result?'':' →'}</button>`
  $('cta').onclick=()=>{ if(dis)return; s.next==='__finish'?finishOnboarding():goTo(s.next) } }
function renderStep(){ const s=STEPS[idx]
  root.innerHTML=shell(s.render()); $('prog').style.width=(s.prog*100)+'%'; $('lblL').textContent=s.label[0]; $('lblR').textContent=s.label[1]
  if(s.back){ $('bk').style.display='grid'; $('bk').onclick=()=>{idx=Math.max(0,idx-1);renderStep()} }
  $('scroll').scrollTop=0
  // video gating: lock the form until watched
  const gated=s.video&&!watched[s.id]; const gw=$('scroll').querySelector('.gatewrap')
  if(gated&&gw){ gw.classList.add('gated'); const lm=document.createElement('div'); lm.className='lockmsg'; lm.innerHTML='🔒 Watch the 5-second clip to unlock this step'; gw.parentNode.insertBefore(lm,gw) }
  $('scroll').querySelectorAll('[data-vid]').forEach(el=>el.onclick=()=>openVideo(el.dataset.vid,el.dataset.vk,()=>renderStep()))
  s.init&&s.init(); setFoot()
  // auto-open the gate video on first arrival
  if(gated&&!s._auto){ s._auto=true; setTimeout(()=>openVideo(s.video,s.id,()=>renderStep()),360) }
}
function goTo(id){ const i=STEPS.findIndex(s=>s.id===id); if(i>=0){idx=i;renderStep()} }
function finishOnboarding(){
  const t=sssTotal(),sv=severity(t)
  S.profile={...D,sssScore:t,band:sv.band,completedAt:todayStr()}
  S.onboarded=true
  // seed today's tracking from device/baseline
  S.today={ sitting:D.habits.sitting,walking:D.habits.walking,exercise:D.habits.exercise*10,sleep:D.habits.sleep }
  S.lastSync=todayStr(); S.streak=Math.max(1,S.streak)
  const firstTime=!S._awarded; S._awarded=true; save()
  if(firstTime) award(200,'Assessment complete')      // +200 once (award handles save + toast)
  renderApp('plan')
}

/* ════════════ MAIN APP (post-onboard) ════════════ */
let tab='today'
function appShell(inner,active){
  return `<div class="hud"><div class="logo"><svg width="22" height="22" viewBox="0 0 24 24"><g fill="#6fe0ff"><rect x="9" y="3" width="6" height="2.4" rx="1.2"/><rect x="8.4" y="6.4" width="7.2" height="2.6" rx="1.3"/><rect x="8.1" y="9.8" width="7.8" height="2.7" rx="1.35"/><rect x="8.1" y="13.2" width="7.8" height="2.7" rx="1.35"/></g><g fill="#ffb020"><rect x="9" y="16.8" width="6" height="2.5" rx="1.25"/><rect x="9" y="20" width="6" height="2.4" rx="1.2"/></g></svg>BackSignal</div><div class="pts">✦ ${S.points}</div></div>
    <div class="scroll" id="scroll" style="padding-bottom:96px">${inner}</div>
    <div class="tabbar">${[['today','🏠','Today'],['plan','🧭','Plan'],['rewards','🎁','Rewards'],['profile','👤','Profile']].map(([k,i,l])=>`<button data-tab="${k}" class="${active===k?'on':''}"><span class="ti">${i}</span>${l}</button>`).join('')}</div>` }
function renderApp(t){ tab=t||tab
  if(tab==='today')root.innerHTML=appShell(viewToday(),'today')
  else if(tab==='plan')root.innerHTML=appShell(viewPlan(),'plan')
  else if(tab==='rewards')root.innerHTML=appShell(viewRewards(),'rewards')
  else root.innerHTML=appShell(viewProfile(),'profile')
  root.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>renderApp(b.dataset.tab))
  if(tab==='today')initToday(); else if(tab==='plan')initPlan(); else if(tab==='rewards')initRewards(); else initProfile()
}
function habitStatus(k,v){ const tgt=TARGETS[k]
  if(k==='sitting')return {ok:v<=tgt,pct:Math.min(100,(tgt/Math.max(v,1))*100),col:v<=tgt?'var(--green)':v<=tgt+2?'var(--amber)':'var(--red)'}
  const pct=Math.min(100,v/tgt*100); return {ok:v>=tgt,pct,col:v>=tgt?'var(--green)':pct>=55?'var(--amber)':'var(--red)'}
}
function viewToday(){
  const p=S.profile,sv=severity(p.sssScore),t=S.today||{sitting:8,walking:30,exercise:15,sleep:7}
  const hist=S.history.slice(-7); const bars=hist.length?hist:[...Array(7)].map(()=>({walking:Math.round(20+Math.random()*40)}))
  const units={sitting:'h',walking:'min',exercise:'min',sleep:'h'}
  return `<div class="greet">${greetWord()}<b>Let’s protect your lower back</b></div>
    <div class="scorecard"><div class="mini"><svg width="78" height="78" viewBox="0 0 120 120" style="transform:rotate(-90deg)"><circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="12"/><circle cx="60" cy="60" r="50" fill="none" stroke="${sv.color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="${314-(p.sssScore/11)*314}"/></svg><div class="n" style="color:${sv.color}">${p.sssScore}</div></div>
      <div class="info"><b>Spine Severity Score</b><div class="band" style="color:${sv.color}">${sv.band}</div><p>${sv.mgmt}</p></div></div>
    <div class="stats"><div class="stat"><div class="k">Points</div><div class="v" style="color:var(--cyan)">${S.points}</div></div><div class="stat"><div class="k">Day streak</div><div class="v">${S.streak} <small>🔥</small></div></div></div>
    <div class="card"><h3>Today’s habits ${S.device?'· from '+S.device:''}</h3>
      ${['sitting','walking','exercise','sleep'].map(k=>{const v=t[k],st=habitStatus(k,v);return `<div class="habit"><div class="pic"><img src="${POSE[k]}" alt=""/></div><div class="hb"><div class="top"><b>${k[0].toUpperCase()+k.slice(1)}</b><span class="v"><b>${v}</b> ${units[k]}</span></div><div class="bar"><i style="width:${st.pct}%;background:${st.col}"></i></div><div class="goal">${st.ok?'✓ Goal met':'Goal: '+(k==='sitting'?'≤':'≥')+TARGETS[k]+' '+units[k]}</div></div></div>`}).join('')}
      <button class="cta syncbtn" id="sync">${S.lastSync===todayStr()?'✓ Synced today — re-sync':'⟳ Sync today from '+(S.device||'device')}</button></div>
    <div class="card"><h3>This week · walking</h3><div class="spark">${[...Array(7)].map((_,i)=>{const v=(bars[i]&&bars[i].walking)||30;return `<i style="height:${Math.min(100,v/60*100)}%"></i>`}).join('')}</div></div>`
}
function initToday(){ const b=$('sync'); if(b)b.onclick=()=>{ const first=S.lastSync!==todayStr()
    // simulate a daily pull from the connected device
    const dev=S.device; const r=()=>Math.random()
    S.today={ sitting:Math.round(6+r()*5), walking:Math.round(25+r()*45), exercise:Math.round(r()*35), sleep:+(5.5+r()*2.5).toFixed(1) }
    S.history.push({date:todayStr(),...S.today}); if(S.history.length>14)S.history.shift()
    if(first){ S.streak+=1; let gained=20; ['sitting','walking','exercise','sleep'].forEach(k=>{if(habitStatus(k,S.today[k]).ok)gained+=25})
      S.lastSync=todayStr(); S.points+=gained; save(); award(gained,'Daily sync · '+S.streak+'-day streak') }
    else{ save() }
    renderApp('today') } }
function viewRewards(){
  return `<div class="ptbig"><b>✦ ${S.points}</b><span>BackSignal points</span></div>
    <p class="sub" style="text-align:center">Earn points from your assessment and daily habit goals — redeem them for real rewards.</p>
    ${REWARDS.map(r=>{const got=S.redeemed.includes(r.id),can=S.points>=r.cost&&!got
      return `<div class="reward ${got?'got':''}"><div class="ic">${r.ic}</div><div class="rb"><b>${r.name}</b><span>${r.desc}</span></div>
        <button class="rc" data-rw="${r.id}" ${(!can&&!got)?'disabled':''}>${got?'✓ Redeemed':r.cost+' ✦'}</button></div>`}).join('')}
    <div class="disc">Rewards are illustrative for this prototype.</div>`
}
function initRewards(){ root.querySelectorAll('[data-rw]').forEach(b=>b.onclick=()=>{ const r=REWARDS.find(x=>x.id===b.dataset.rw)
    if(S.redeemed.includes(r.id)||S.points<r.cost)return; S.points-=r.cost; S.redeemed.push(r.id); save(); award(0,'Redeemed: '+r.name); renderApp('rewards') }) }
function viewProfile(){
  const p=S.profile,sv=severity(p.sssScore)
  return `<div class="card" style="margin-top:8px"><h3>Your profile</h3><div class="bd" style="margin-top:10px">
    <div class="b"><span class="n">Age / Sex</span><span class="v">${p.age} · ${p.sex||'–'}</span></div>
    <div class="b"><span class="n">BMI</span><span class="v">${bmiOf(p.weight,p.height).toFixed(1)}</span></div>
    <div class="b"><span class="n">Latest score</span><span class="v" style="color:${sv.color}">${p.sssScore}/11 · ${sv.band}</span></div>
    <div class="b"><span class="n">Health device</span><span class="v">${S.device||'Not connected'}</span></div>
    <div class="b"><span class="n">Assessed</span><span class="v">${p.completedAt}</span></div></div></div>
    <div class="trust" style="border:0"><span class="by">Verified by ${APP.doctor}</span><br/>Dept. of Spine Surgery — Spine Severity System (SSS)<br/><a href="${APP.links.website}" target="_blank" rel="noopener">Website</a> · <a href="${APP.links.youtube}" target="_blank" rel="noopener">Videos</a> · <a href="${APP.links.research}" target="_blank" rel="noopener">Research</a></div>
    <button class="cta sec" id="retake" style="margin-top:18px">↻ Retake assessment</button>
    <button class="cta sec" id="reset">Reset app</button>
    <div class="disc">Screening & decision support only — not a diagnosis or a substitute for clinical judgment.</div>`
}
function initProfile(){ $('retake').onclick=()=>{ D={age:S.profile.age,sex:S.profile.sex,occupation:S.profile.occupation,height:S.profile.height,weight:S.profile.weight,vas:null,sciatica:null,odi:{Walking:0,Sitting:0,Standing:0,Sleep:0,'Daily activities':0},chronicity:null,redflags:[],habits:{sitting:8,walking:30,exercise:2,sleep:7}}; watched={}; STEPS.forEach(s=>s._auto=false); idx=STEPS.findIndex(s=>s.id==='vas'); renderStep() }
  $('reset').onclick=()=>{ localStorage.removeItem(KEY); location.reload() } }
function greetWord(){ const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening' }

/* ── PLAN (next steps, grounded in SSS management bands + Daily-Habit guidance) ── */
function planData(){
  const p=S.profile, sv=severity(p.sssScore), t=S.today||{}
  const clinical={
    'LOW':{t:'Self-care plan',d:'Your score is low — keep it that way with good posture, daily movement and exercise. Re-check in about 4 weeks.'},
    'MILD–MODERATE':{t:'Physiotherapy + habit correction',d:'Begin guided physiotherapy and correct the daily habits below. Get a clinical evaluation if there’s no improvement in 2 weeks.'},
    'MODERATE–SEVERE':{t:'See a spine specialist',d:'Your score suggests a spine-specialist consultation for proper assessment and advanced care.'},
    'SEVERE / HIGH RISK':{t:'Urgent specialist care',d:'Seek urgent spine-specialist evaluation now — please don’t wait on this.'},
  }[sv.band]
  const acts=[]
  const add=(id,emoji,title,why,met)=>acts.push({id,emoji,title,why,met})
  if(t.sitting!=null)  add('sit','🪑','Stand or walk 2–3 min every 30 min','Prolonged sitting raises lumbar disc pressure, weakens the core and collapses posture.', t.sitting<=TARGETS.sitting)
  if(t.walking!=null)  add('walk','🚶','Build toward 45 minutes of walking a day','Low walking reduces spinal mobility and endurance.', t.walking>=TARGETS.walking)
  if(t.exercise!=null) add('ex','🏋️','Core & back strengthening, 3×/week','Lack of exercise weakens the muscles that support the spine.', t.exercise>=TARGETS.exercise)
  if(t.sleep!=null)    add('sleep','😴','Aim for 7–8 hours of sleep','Poor sleep increases inflammation and delays recovery.', t.sleep>=TARGETS.sleep)
  const notes=[]
  if((p.sciatica||0)>=2) notes.push('Leg pain or numbness: avoid prolonged bending and heavy strain. If it worsens or affects walking, see a specialist.')
  if(p.chronicity==='chronic') notes.push('Pain lasting over 6 weeks responds better to a structured program than to rest — stay active within comfort.')
  if((p.vas||0)>=7) notes.push('High pain right now: short-term relief plus gentle movement; avoid prolonged bed rest.')
  return {sv,clinical,acts,notes,redflag:hasRedFlag()}
}
function viewPlan(){
  const d=planData(); S.planDone=S.planDone||[]
  return `<div class="eyebrow">Your next steps</div><h1 class="q" style="font-size:22px">A plan for your lower back</h1>
    ${d.redflag?`<div class="warn" style="margin-top:14px">⚠ A red flag was indicated — please seek <b>urgent spine-specialist evaluation</b> before following the rest of this plan.</div>`:''}
    <div class="mgmt" style="background:${d.sv.color}14;border:1px solid ${d.sv.color}40;margin-top:14px"><b>${d.clinical.t}</b><br/><span style="color:var(--mut)">${d.clinical.d}</span>
      ${d.sv.band==='LOW'?'':`<button class="cta" id="findcare" style="margin-top:12px">Find care / book →</button>`}</div>
    <div class="card"><h3>Correct your daily habits</h3>
      ${d.acts.map(a=>{const done=S.planDone.includes(a.id),ok=a.met||done;return `<div class="flag ${ok?'on':''}" data-act="${a.id}" style="${a.met?'border-color:rgba(52,211,153,.35)':''}"><span class="bx" style="${ok?'background:var(--green);border-color:var(--green)':''}">${ok?'✓':''}</span><div><div style="font-size:13px;font-weight:600">${a.emoji} ${a.title}</div><div style="font-size:11.5px;color:var(--mut2);margin-top:3px;line-height:1.45">${a.met?'You’re already on target — keep it up.':a.why}</div></div></div>`}).join('')}</div>
    ${d.notes.length?`<div class="card"><h3>Notes for your symptoms</h3>${d.notes.map(n=>`<p class="sub" style="margin-top:8px">• ${n}</p>`).join('')}</div>`:''}
    <div class="card" style="background:rgba(56,189,248,.06)"><p class="sub" style="margin-top:0;color:#c2d6ef">Most chronic back pain develops from unhealthy habits repeated daily. Early lifestyle correction can prevent long-term spine degeneration and disability.</p><div style="font-size:11px;color:var(--mut2);margin-top:8px">— ${APP.doctor}, Spine Severity System</div></div>
    <div class="trust" style="border:0"><a href="${APP.links.website}" target="_blank" rel="noopener">Website</a> · <a href="${APP.links.youtube}" target="_blank" rel="noopener">Exercise videos</a> · <a href="${APP.links.research}" target="_blank" rel="noopener">Research</a></div>`
}
function initPlan(){
  S.planDone=S.planDone||[]
  root.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>{ const id=el.dataset.act, a=planData().acts.find(x=>x.id===id)
    if(!a||a.met||S.planDone.includes(id))return; S.planDone.push(id); save(); award(15,'Step committed'); renderApp('plan') })
  const fc=$('findcare'); if(fc)fc.onclick=()=>window.open(APP.links.website,'_blank')
}

/* ── boot ── */
if(S.onboarded&&S.profile){ Object.assign(D,S.profile); renderApp('today') } else { idx=0; renderStep() }
</script>
</body>
</html>
