<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BackSignal — Your Personal Spine Severity Score</title>
<meta name="description" content="BackSignal — a doctor-verified lower-back (lumbar) severity screening and daily spine-health tracker, based on the Spine Severity System by Dr Ayush Sharma." />
<meta name="theme-color" content="#02030a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BackSignal" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2302030a'/%3E%3Cg fill='%236fe0ff'%3E%3Crect x='9' y='3' width='6' height='2.4' rx='1.2'/%3E%3Crect x='8.4' y='6.4' width='7.2' height='2.6' rx='1.3'/%3E%3Crect x='8.1' y='9.8' width='7.8' height='2.7' rx='1.35'/%3E%3Crect x='8.1' y='13.2' width='7.8' height='2.7' rx='1.35'/%3E%3C/g%3E%3Cg fill='%23ffb020'%3E%3Crect x='9' y='16.8' width='6' height='2.5' rx='1.25'/%3E%3Crect x='9' y='20' width='6' height='2.4' rx='1.2'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<!-- Indic scripts for multilingual (broad set). TODO native: bundle locally instead of CDN. -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Gujarati:wght@400;600;700&family=Noto+Sans+Kannada:wght@400;600;700&family=Noto+Sans+Malayalam:wght@400;600;700&family=Noto+Sans+Gurmukhi:wght@400;600;700&family=Noto+Sans+Oriya:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Sans+Ol+Chiki:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg0:#02030a;--bg1:#061b3a;--bg2:#08284f;
    --ink:#eaf2ff;--mut:#9fc0e8;--mut2:#6f93bd;--line:rgba(120,180,255,.16);
    --cyan:#5fd0ff;--blue:#38bdf8;--indigo:#818cf8;--gold:#ffb020;
    --green:#34d399;--amber:#fbbf24;--orange:#fb923c;--red:#f87171;
    --card:rgba(8,20,40,.6);
  }
  html,body{height:100%}
  body{font-family:'Sora',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(125% 80% at 50% 4%,var(--bg2) 0%,var(--bg1) 34%,#020c1e 64%,var(--bg0) 100%);overflow:hidden}
  #app{position:relative;width:100%;max-width:430px;height:100dvh;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
  ::-webkit-scrollbar{width:0;height:0}
  svg.ic{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  svg.ic.f{fill:currentColor;stroke:none}

  /* entrance animations */
  @keyframes enterUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes slideInL{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
  @keyframes slideOutR{to{opacity:0;transform:translateX(120%);height:0;margin:0;padding:0;border-width:0}}
  @keyframes float{0%,100%{transform:translateY(-5px)}50%{transform:translateY(5px)}}
  @keyframes glow{0%,100%{opacity:.5}50%{opacity:.85}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important}}

  .hud{flex:none;padding:15px 20px 8px;display:flex;align-items:center;gap:10px}
  .hud .bk{background:rgba(10,28,56,.6);border:1px solid var(--line);color:#bcd4f0;width:30px;height:30px;border-radius:50%;cursor:pointer;flex:none;display:none;align-items:center;justify-content:center}
  .hud .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .hud .logo svg{filter:drop-shadow(0 0 8px rgba(95,208,255,.5))}
  .hud .cert{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);padding:4px 9px;border-radius:99px;font-weight:600}
  .hud .pts{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);padding:4px 11px;border-radius:99px}
  .prog{flex:none;height:3px;margin:2px 20px 0;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  .prog i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--indigo));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .steplbl{flex:none;padding:8px 20px 0;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);display:flex;justify-content:space-between}

  .scroll{flex:1;overflow-y:auto;padding:8px 20px 150px;-webkit-overflow-scrolling:touch}
  .scroll.app{padding-bottom:96px}
  .scroll>*{animation:enterUp .5s both cubic-bezier(.2,.8,.2,1)}
  .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan);font-weight:600}
  h1.q{font-size:23px;font-weight:600;line-height:1.18;margin-top:6px;letter-spacing:-.2px}
  p.sub{font-size:13px;color:var(--mut);line-height:1.5;margin-top:8px}
  .lumbar{color:var(--gold);font-weight:600}

  .foot{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--bg0) 58%,transparent)}
  .cta{width:100%;border:0;border-radius:16px;padding:16px;font-family:inherit;font-size:15.5px;font-weight:700;color:#02121f;cursor:pointer;background:linear-gradient(120deg,var(--cyan),var(--indigo));display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,filter .2s}
  .cta:active{transform:scale(.985)} .cta:disabled{opacity:.4;cursor:not-allowed}
  .cta.sec{background:transparent;color:var(--mut);border:1px solid var(--line);margin-top:9px}

  .gatewrap.gated{filter:blur(5px);opacity:.45;pointer-events:none;user-select:none}
  .lockmsg{margin-top:14px;display:flex;align-items:center;gap:9px;background:rgba(56,189,248,.08);border:1px solid rgba(95,208,255,.28);border-radius:13px;padding:13px;font-size:12.5px;color:var(--cyan)}

  .vcard{margin-top:16px;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 13px;cursor:pointer;transition:border-color .2s}
  .vcard:active{border-color:var(--cyan)}
  .vcard .thumb{position:relative;width:48px;height:62px;flex:none;border-radius:10px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0,#0d3a6e,#04132b);display:grid;place-items:center;color:#fff}
  .vcard .meta b{display:block;font-size:13px;font-weight:600} .vcard .meta span{font-size:11px;color:var(--mut2)}
  .vcard .yt{margin-left:auto;font-size:9px;letter-spacing:1px;color:var(--mut2);text-transform:uppercase}
  .vcard.done{border-color:rgba(52,211,153,.4)} .vcard.done .yt{color:var(--green)}
  .vfab{position:absolute;right:16px;bottom:96px;z-index:30;display:inline-flex;align-items:center;gap:6px;background:rgba(8,28,56,.82);border:1px solid rgba(95,208,255,.42);color:var(--cyan);font-family:inherit;font-size:12px;font-weight:700;padding:9px 14px;border-radius:99px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.45);animation:fabIn .35s cubic-bezier(.2,.8,.2,1) both}
  .vfab:active{transform:scale(.95)}
  @keyframes fabIn{from{opacity:0;transform:translateY(10px) scale(.9)}to{opacity:1;transform:none}}

  .pmask{position:fixed;inset:0;z-index:60;background:rgba(2,8,20,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:18px}
  .pmask.show{display:flex}
  .pwrap{position:relative;width:100%;max-width:300px}
  .pX{position:absolute;top:8px;right:8px;z-index:4;width:30px;height:30px;border-radius:50%;border:0;background:rgba(2,10,24,.6);color:#cfe0f5;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .pscreen{position:relative;width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;background:radial-gradient(120% 80% at 50% 6%,#0d3a6e,#04132b 72%);border:1px solid var(--line)}
  .pscreen iframe{width:100%;height:100%;border:0;display:block}
  .pscreen video{width:100%;height:100%;display:block;object-fit:cover;background:#04132b}
  .pplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;width:66px;height:66px;border-radius:50%;border:1px solid rgba(95,208,255,.55);background:rgba(3,14,32,.5);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 10px 34px rgba(0,0,0,.45);animation:pulseSoft 2.4s ease-in-out infinite;transition:background .2s}
  .pplay svg{margin-left:3px} .pplay:hover{background:rgba(13,58,110,.72)}
  @keyframes pulseSoft{0%,100%{box-shadow:0 10px 34px rgba(0,0,0,.45),0 0 0 0 rgba(95,208,255,.4)}50%{box-shadow:0 10px 34px rgba(0,0,0,.45),0 0 0 10px rgba(95,208,255,0)}}

  /* sciatica pain-flow drawn over the body image */
  .nerveviz{position:relative;display:flex;flex-direction:column;align-items:center;margin:0 0 6px;--heat:.14;--flow:2.6s}
  .painfig{position:relative;height:296px;display:block;background:radial-gradient(120% 60% at 50% 34%,rgba(13,58,110,.45),transparent 72%)}
  .painfig>img{height:100%;width:auto;display:block;filter:drop-shadow(0 6px 22px rgba(0,0,0,.5))}
  .painfig .painflow{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
  .nerveviz .nheat{fill:none;stroke:#ff4d4d;stroke-width:30;stroke-linecap:round;filter:url(#nglow);opacity:calc(var(--heat) * 1.55)}
  .nerveviz .heat{fill:url(#heatg);opacity:var(--heat);animation:heatPulse 2.6s ease-in-out infinite}
  .nerveviz .nhalo{fill:none;stroke:#ffce4a;stroke-width:15;stroke-linecap:round;opacity:.4;filter:url(#nglow)}
  .nerveviz .nmid{fill:none;stroke:#ffd86a;stroke-width:7;stroke-linecap:round;opacity:.8}
  .nerveviz .ncore{fill:none;stroke:#fff4d2;stroke-width:3;stroke-linecap:round;opacity:.95}
  .nerveviz .pulse{fill:none;stroke:#fff7df;stroke-width:6;stroke-linecap:round;stroke-dasharray:12 88;filter:url(#nglow);animation:nflow var(--flow) linear infinite}
  .nerveviz .pulse.b{animation-delay:calc(var(--flow) / -2)}
  .nerveviz .spark{fill:#fff;filter:url(#nglow);transform-box:fill-box;transform-origin:center;animation:sparkP 1.7s ease-in-out infinite}
  .nervecap{font-size:11px;color:var(--mut);text-align:center;max-width:250px;margin-top:4px;display:flex;align-items:center;gap:6px;justify-content:center;line-height:1.4}
  .nervecap i{flex:none;width:6px;height:6px;border-radius:50%;background:#ffd24a;box-shadow:0 0 8px #ffd24a;animation:sparkP 1.4s ease-in-out infinite}
  @keyframes nflow{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
  @keyframes heatPulse{0%,100%{opacity:calc(var(--heat) * .65)}50%{opacity:var(--heat)}}
  @keyframes sparkP{0%,100%{opacity:.45;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
  .pscreen .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 22px}
  .pscreen .ph img{width:46px;opacity:.85;margin-bottom:13px;filter:drop-shadow(0 0 16px rgba(95,208,255,.5))}
  .pscreen .ph .pt{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
  .pscreen .ph h3{font-size:16px;font-weight:600;margin:6px 0 9px} .pscreen .ph p{font-size:12px;color:#c2d6ef;line-height:1.5}
  .pbar{height:3px;border-radius:99px;background:rgba(255,255,255,.14);margin:12px 2px 0;overflow:hidden}.pbar i{display:block;height:100%;width:0;background:var(--cyan);transition:width .1s linear}
  .ptime{text-align:center;font-size:10.5px;color:var(--mut2);margin-top:7px}

  .field{margin-top:14px}.field label{font-size:12px;color:var(--mut)}
  .field input,.field select{width:100%;margin-top:6px;background:rgba(10,26,50,.6);border:1px solid var(--line);border-radius:13px;padding:13px 14px;color:#fff;font-family:inherit;font-size:15px;outline:none}
  .field input:focus{border-color:var(--cyan)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .prefill{font-size:10.5px;color:var(--green);margin-top:5px;display:flex;align-items:center;gap:5px}
  .chips{display:grid;gap:9px;margin-top:14px}.chips.two{grid-template-columns:1fr 1fr}
  .chip{border:1px solid var(--line);background:rgba(12,28,54,.6);color:#cfe0f5;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .16s;display:flex;align-items:center;gap:10px}
  .chip .ci{color:var(--cyan);flex:none}
  .chip b{display:block;font-size:11.5px;color:var(--mut2);font-weight:500;margin-top:3px}
  .chip.on{border-color:var(--cyan);background:linear-gradient(135deg,rgba(56,189,248,.2),rgba(56,189,248,.04));color:#fff}.chip.on b{color:var(--cyan)}

  .faces{display:flex;justify-content:space-between;gap:6px;margin-top:18px}
  .face{flex:1;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:14px;padding:10px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
  .face svg{width:28px;height:28px}.face span{font-size:12px;font-weight:600;color:var(--mut)}.face.on{transform:translateY(-3px)}
  .vaslbl{text-align:center;margin-top:14px;font-size:14px;font-weight:600}

  /* ODI — visual */
  .odiring{display:grid;place-items:center;position:relative;margin:16px 0 6px}
  .odiring .n{position:absolute;text-align:center}.odiring .n b{font-size:34px;font-weight:800}.odiring .n span{display:block;font-size:9px;letter-spacing:1.5px;color:var(--mut2);text-transform:uppercase}
  .odi{display:grid;gap:9px}
  .odirow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px}
  .odirow .hd{display:flex;align-items:center;gap:9px;font-size:13.5px;color:#dbe8fa;margin-bottom:9px}.odirow .hd .ci{color:var(--cyan)}
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .seg button{border:1px solid var(--line);background:rgba(12,28,54,.55);color:var(--mut);border-radius:10px;padding:9px 2px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .14s}
  .seg button.on{color:#02121f}.seg button.g.on{background:var(--green);border-color:var(--green)}.seg button.a.on{background:var(--amber);border-color:var(--amber)}.seg button.r.on{background:var(--red);border-color:var(--red);color:#fff}

  .flags{margin-top:14px;display:grid;gap:7px}
  .flag{display:flex;align-items:center;gap:11px;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:12px;padding:11px 13px;cursor:pointer;font-size:13px;transition:all .15s}
  .flag .bx{width:20px;height:20px;flex:none;border-radius:6px;border:1.5px solid var(--mut2);display:grid;place-items:center;color:#02121f}
  .flag.on{border-color:var(--red);background:rgba(248,113,113,.12)}.flag.on .bx{background:var(--red);border-color:var(--red)}
  .warn{margin-top:12px;display:flex;gap:9px;align-items:flex-start;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);border-radius:13px;padding:12px 13px;font-size:12px;color:#ffd2d2;line-height:1.5}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px}

  .dev{display:flex;align-items:center;gap:13px;border:1px solid var(--line);background:rgba(12,28,54,.55);border-radius:14px;padding:14px;cursor:pointer;margin-top:10px;transition:all .15s}
  .dev:active{transform:scale(.99)}.dev .di{width:34px;height:34px;flex:none;display:grid;place-items:center}.dev b{font-size:14px}.dev span{font-size:11.5px;color:var(--mut2);display:block}.dev .arr{margin-left:auto;color:var(--mut2)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .synced{display:flex;align-items:center;gap:6px;color:var(--green);font-size:12.5px;font-weight:600;margin:14px 0 4px}
  .srow{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}.srow .k{color:var(--mut)}.srow .v{color:#fff;font-weight:600}

  .habit{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-top:10px}
  .habit .pic{width:46px;height:60px;flex:none;border-radius:11px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0,#0d3a6e,#04132b);display:grid;place-items:end center}
  .habit .pic img{height:58px;width:auto;filter:drop-shadow(0 0 10px rgba(95,208,255,.4))}
  .habit .hb{flex:1}.habit .top{display:flex;justify-content:space-between;align-items:baseline}.habit .top b{font-size:15px}.habit .top .v{font-size:13px;color:var(--mut)}.habit .top .v b{color:#fff;font-size:16px}
  .habit .bar{height:6px;border-radius:99px;background:rgba(255,255,255,.08);margin-top:8px;overflow:hidden}.habit .bar i{display:block;height:100%;border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .habit .goal{font-size:10.5px;color:var(--mut2);margin-top:5px;display:flex;align-items:center;gap:5px}
  .habit .hedit{flex:none;align-self:center;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:rgba(10,28,56,.5);color:#bcd4f0;display:grid;place-items:center;cursor:pointer}
  .habit.editing{border-color:rgba(95,208,255,.4)}
  .hedit-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .hedit-row input{width:80px;background:rgba(10,26,50,.7);border:1px solid var(--cyan);border-radius:10px;padding:9px 10px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;outline:none;text-align:center;-moz-appearance:textfield}
  .hedit-row input::-webkit-outer-spin-button,.hedit-row input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .hedit-row .un{font-size:12px;color:var(--mut)}
  .hedit-row .hsave{margin-left:auto;width:36px;height:36px;border-radius:10px;border:0;background:linear-gradient(120deg,var(--cyan),var(--indigo));color:#02121f;display:grid;place-items:center;cursor:pointer}
  .hedit-row .hcancel{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--mut);display:grid;place-items:center;cursor:pointer}
  .cardhd{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .cardhd .lnk{flex:none;display:flex;align-items:center;gap:5px;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);border-radius:99px;padding:5px 11px;cursor:pointer}
  .manualnote{font-size:11px;color:var(--mut2);margin-top:10px;display:flex;align-items:center;gap:6px;justify-content:center}

  .hero{position:relative;display:flex;justify-content:center;margin:4px 0 0}
  .hero img{height:280px;width:auto;filter:drop-shadow(0 10px 40px rgba(0,40,90,.6));animation:float 7s ease-in-out infinite}
  .hero .lumglow{position:absolute;left:50%;top:54%;width:130px;height:115px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,var(--gold),transparent 62%);opacity:.55;filter:blur(6px);mix-blend-mode:screen;animation:glow 4s ease-in-out infinite}

  .ring{display:grid;place-items:center;position:relative;margin:6px 0}
  .ring .num{position:absolute;text-align:center}.ring .num b{font-size:44px;font-weight:800;letter-spacing:-1px}.ring .num span{display:block;font-size:9.5px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}

</style>
</head>

const cc=document.getElementById('confetti'),cx=cc.getContext('2d')
function fitC(){cc.width=innerWidth;cc.height=innerHeight}; fitC(); addEventListener('resize',fitC)
let parts=[],raf=null
function confetti(x,y){
  const cols=['#5fd0ff','#818cf8','#ffb020','#34d399','#ffffff']
  for(let i=0;i<46;i++)parts.push({x,y,vx:(Math.random()-.5)*8,vy:-Math.random()*10-3,g:.35,r:Math.random()*5+3,c:cols[i%cols.length],a:1,rot:Math.random()*6,vr:(Math.random()-.5)*.5})
  if(!raf)raf=requestAnimationFrame(step)
}
function step(){
  cx.clearRect(0,0,cc.width,cc.height); let alive=false
  for(const p of parts){ if(p.a<=0)continue; alive=true; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.a-=.012

  if(alive)raf=requestAnimationFrame(step); else{ raf=null; parts=[]; cx.clearRect(0,0,cc.width,cc.height) }
}

function shiftMonth(delta){ const [y,m]=calMonth.split('-').map(Number),d=new Date(y,m-1+delta,1); calMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') }

/* ════════════ scoring (SSS) ════════════ */
const bmiOf=(w,h)=>w/Math.pow(h/100,2)
const bmiScore=()=>{const b=bmiOf(D.weight,D.height);return b<25?0:b<30?1:2}
const vasPoints=()=>D.vas==null?0:D.vas<=3?0:D.vas<=6?1:2
const odiTotal=()=>Object.values(D.odi).reduce((a,b)=>a+b,0)
const odiPoints=()=>{const t=odiTotal();return t<=2?0:t<=5?1:2}
const chronScore=()=>({acute:0,subacute:1,chronic:2})[D.chronicity]??0
const hasRedFlag=()=>D.redflags.length>0
const sssTotal=()=>hasRedFlag()?11:vasPoints()+(D.sciatica||0)+odiPoints()+bmiScore()+chronScore()
function severity(t){
  if(hasRedFlag()||t>=10)return{band:'SEVERE / HIGH RISK',color:'var(--red)',hex:'#f87171',desc:'Severe symptoms with possible serious pathology.',mgmt:'Urgent spine-specialist evaluation / advanced care.'}
  if(t>=7)return{band:'MODERATE–SEVERE',color:'var(--orange)',hex:'#fb923c',desc:'Moderate-to-severe pain and disability; marked limitation.',mgmt:'Spine specialist consultation and advanced care.'}
  if(t>=4)return{band:'MILD–MODERATE',color:'var(--amber)',hex:'#fbbf24',desc:'Mild-to-moderate pain with some functional limitation.',mgmt:'Physiotherapy, lifestyle correction and evaluation.'}
  return{band:'LOW',color:'var(--green)',hex:'#34d399',desc:'Minimal pain and low impact on your day.',mgmt:'Education, posture correction and regular exercise.'}
}
// Age-specific spine pattern — PLACEHOLDER mapping; final formula to be set/validated by Dr Sharma.
function spineAgeData(){ const t=sssTotal(),age=Math.max(16,+D.age||35),yrs=Math.round((t-3)*1.7),spine=Math.max(16,age+yrs),sv=severity(t)
  const pat = t<=3?{label:'Excellent spine protection',note:'Your symptoms and lifestyle suggest a spine working younger than your age. Keep moving and watch your sitting to hold this.'}
    : t<=6?{label:'Early wear pattern',note:'A few habits and symptoms are ageing your spine faster than your years. Small daily corrections can reverse this.'}
    : t<=9?{label:'High degeneration pattern',note:'Your symptoms and lifestyle resemble a noticeably older spine. Early action can slow — and often reverse — this.'}
    : {label:'Advanced degeneration pattern',note:'Your pattern suggests significant strain on the lumbar spine. Prompt specialist input is important.'}
  return {age,spine,yrs,sv,pat}
}

let ptimer=null,pcb=null,pvid=null
const mmss=s=>{s=Math.max(0,Math.floor(s||0));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function stopVid(){ if(pvid){try{pvid.pause()}catch(e){} pvid.removeAttribute('src'); pvid=null} clearInterval(ptimer); pscreen.innerHTML='' }
function videoCard(key,id){ const v=APP.videos[key]
  if(watched[id||key]) return ''   // watched → no inline card; a floating Replay button is shown instead
  return `<div class="vcard" data-vid="${key}" data-vk="${id||key}"><div class="thumb">${icon('play',16,'f')}</div><div class="meta"><b>${v.title}</b><span>Why we ask · 0:05</span></div><div class="yt">Watch</div></div>` }
function openVideo(key,wkey,onDone){
  const v=APP.videos[key]; pcb=onDone||null; stopVid(); pbar.style.width='0%'; pdone.disabled=true; pdone.textContent='Watch to continue'
  const wk=wkey||key,replay=!!watched[wk]
  pmask.classList.add('show'); pmask.dataset.wk=wk; pXb.style.display=replay?'flex':'none'
  const unlock=()=>{ if(!replay){pdone.disabled=false;pdone.textContent='Continue'} }
  if(v.src){                                   // ── real video: tap to play, sound on, gate on actual playback ──
    ptime.textContent='0:00'
    pscreen.innerHTML=`<video id="pvid" playsinline preload="auto" ${v.poster?`poster="${v.poster}"`:''} src="${v.src}"></video><button class="pplay" id="pplay" aria-label="Play">${icon('play',26,'f')}</button>`
    const vid=document.getElementById('pvid'),pl=document.getElementById('pplay'); pvid=vid; vid.volume=1
    const playNow=()=>{ vid.muted=false; vid.volume=1; vid.play().catch(()=>{}) }
    pl.onclick=playNow
    vid.onclick=()=>{ vid.paused?playNow():vid.pause() }
    vid.onplay=()=>{ pl.style.display='none' }
    vid.onpause=()=>{ if(!vid.ended)pl.style.display='flex' }
    if(replay){pdone.disabled=false;pdone.textContent='Close'}
    vid.ontimeupdate=()=>{ const d=vid.duration||1,f=Math.min(1,vid.currentTime/d); pbar.style.width=f*100+'%'; ptime.textContent=mmss(vid.currentTime)+' / '+mmss(d); if(f>=0.992)unlock() }
    vid.onended=()=>{ pbar.style.width='100%'; pl.style.display='none'; unlock() }
  } else {                                      // ── placeholder / YouTube fallback: 5s timer ──
    ptime.textContent='0:00 / 0:05'
    pscreen.innerHTML=v.id?`<iframe src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1&playsinline=1&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`:`<div class="ph"><img src="assets/stand.webp" alt=""/><div class="pt">${APP.doctor} · Spine Lab</div><h3>${v.title}</h3><p>${v.script}</p></div>`
    if(replay){pdone.disabled=false;pdone.textContent='Close'}
    let p=0; ptimer=setInterval(()=>{ p+=0.1; const f=Math.min(1,p/5); pbar.style.width=f*100+'%'; ptime.textContent='0:0'+Math.min(5,Math.floor(p))+' / 0:05'; if(f>=1){clearInterval(ptimer); unlock()} },100)
  }
}

function langData(){ return LANGS.find(x=>x.code===(S.lang||'en'))||LANGS[0] }
function langSelector(){ const cur=S.lang||'en'
  return `<div class="langsel">${LANGS.map(l=>`<button class="langchip ${cur===l.code?'on':''}" data-lang="${l.code}"${l.noto?` style="font-family:'${l.noto}',sans-serif"`:''}>${l.name}</button>`).join('')}</div>${cur!=='en'?`<div class="langdraft">${icon('shield',12)} ${(TR[cur]&&TR[cur]['__draft'])||'Draft translation — not yet clinically reviewed'}</div>`:''}` }
function selectLang(code){ S.lang=code; save(); S.onboarded?renderApp(tab):renderStep() }
function openLangSheet(){ const cur=S.lang||'en'
  const el=document.createElement('div'); el.className='sheet'; el.id='langsheet'
  el.innerHTML=`<div class="sheet-card"><div class="sheet-h">${icon('globe',16,'ci')}<b>Choose language</b><button class="sheet-x" id="lsx">${icon('x',15)}</button></div><div class="langsel">${LANGS.map(l=>`<button class="langchip ${cur===l.code?'on':''}" data-lang="${l.code}"${l.noto?` style="font-family:'${l.noto}',sans-serif"`:''}>${l.name}</button>`).join('')}</div></div>`
  document.body.appendChild(el)
  el.querySelector('#lsx').onclick=()=>el.remove()
  el.onclick=e=>{ if(e.target===el)el.remove() }
  el.querySelectorAll('.langchip').forEach(b=>b.onclick=()=>{ el.remove(); selectLang(b.dataset.lang) }) }
function applyLang(){ root.querySelectorAll('.langchip').forEach(b=>b.onclick=()=>selectLang(b.dataset.lang))
  const L=langData(); root.style.fontFamily = L.code==='en'?'' : `'${L.noto}','Sora',system-ui,sans-serif`
  const dict=TR[L.code]; if(!dict)return
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT); const ns=[]; let n; while(n=w.nextNode())ns.push(n)
  ns.forEach(t=>{ const k=t.nodeValue.trim(); if(k&&dict[k])t.nodeValue=t.nodeValue.replace(k,dict[k]) }) }
function animKids(){ [...$('scroll').children].forEach((c,i)=>{c.style.animationDelay=(i*0.05)+'s'}) }
function logoSvg(){ return `<svg width="22" height="22" viewBox="0 0 24 24"><g fill="#6fe0ff"><rect x="9" y="3" width="6" height="2.4" rx="1.2"/><rect x="8.4" y="6.4" width="7.2" height="2.6" rx="1.3"/><rect x="8.1" y="9.8" width="7.8" height="2.7" rx="1.35"/><rect x="8.1" y="13.2" width="7.8" height="2.7" rx="1.35"/></g><g fill="#ffb020"><rect x="9" y="16.8" width="6" height="2.5" rx="1.25"/><rect x="9" y="20" width="6" height="2.4" rx="1.2"/></g></svg>` }
function shell(inner){ return `<div class="hud"><button class="bk" id="bk">${icon('arrow',16)}</button><div class="logo">${logoSvg()}BackSignal</div><div class="cert">${icon('shield',13)} Doctor-verified</div></div><div class="prog"><i id="prog"></i></div><div class="steplbl"><span id="lblL"></span><span id="lblR"></span></div><div class="scroll" id="scroll">${inner}</div><div class="foot" id="foot"></div>` }
function setFoot(){ const s=STEPS[idx],gated=s.video&&s.gate!==false&&!watched[s.id],label=typeof s.cta==='function'?s.cta():s.cta,dis=gated||(s.canNext&&!s.canNext())
  $('foot').innerHTML=`<button class="cta" id="cta" ${dis?'disabled':''}>${label}${s.result?'':''}</button>`; $('cta').onclick=()=>{ if(dis)return; s.next==='__finish'?finishOnboarding():goTo(s.next) } }
function renderStep(){ const s=STEPS[idx]; root.innerHTML=shell(s.render()); $('prog').style.width=(s.prog*100)+'%'; $('lblL').textContent=s.label[0]; $('lblR').textContent=s.label[1]
  if(s.back){$('bk').style.display='flex';$('bk').querySelector('svg').style.transform='scaleX(-1)';$('bk').onclick=()=>{idx=Math.max(0,idx-1);renderStep()}}
  $('scroll').scrollTop=0; animKids()
  const gated=s.video&&s.gate!==false&&!watched[s.id],gw=$('scroll').querySelector('.gatewrap')
  if(gated&&gw){gw.classList.add('gated');const lm=document.createElement('div');lm.className='lockmsg';lm.innerHTML=icon('play',15)+' Watch the 5-second clip to unlock this step';gw.parentNode.insertBefore(lm,gw)}
  $('scroll').querySelectorAll('[data-vid]').forEach(el=>el.onclick=()=>openVideo(el.dataset.vid,el.dataset.vk,()=>renderStep()))
  s.init&&s.init(); setFoot()
  if(s.video&&watched[s.id]){ root.insertAdjacentHTML('beforeend',`<button class="vfab" id="vfab" aria-label="Replay clip">${icon('play',14,'f')} Replay clip</button>`); $('vfab').onclick=()=>openVideo(s.video,s.id,()=>renderStep()) }
  if(gated&&!s._auto){s._auto=true;setTimeout(()=>openVideo(s.video,s.id,()=>renderStep()),360)}
  applyLang()
}
function goTo(id){const i=STEPS.findIndex(s=>s.id===id);if(i>=0){idx=i;renderStep()}}
function pickTasks(){ // adapt to score/habits
  const pool=[...TASK_POOL]; const pri=[]
  const t=S.today||{}
  if((t.sitting||8)>TARGETS.sitting)pri.push('break'); if((t.walking||30)<TARGETS.walking)pri.push('walk10'); if((D.sciatica||0)>=1||odiTotal()>3)pri.push('catcow'); if((t.sleep||7)<TARGETS.sleep)pri.push('winddown')
  const order=[...new Set([...pri,...pool.map(p=>p.id)])]
  return order.slice(0,3)
}
function finishOnboarding(){ const t=sssTotal(),sv=severity(t)
  S.profile={...D,sssScore:t,band:sv.band,completedAt:todayStr()}; S.onboarded=true
  S.today={sitting:D.habits.sitting,walking:D.habits.walking,exercise:D.habits.exercise*10,sleep:D.habits.sleep}
  S.entries=seedEntries(); S.entries[todayStr()]={...S.today}; selDate=todayStr(); calMonth=todayStr().slice(0,7)
  S.lastSync=todayStr(); S.streak=Math.max(1,S.streak); S.tasks=pickTasks()
  const firstTime=!S._awarded; S._awarded=true; save()
  if(firstTime)award(200,'Assessment complete',[innerWidth/2,innerHeight*0.4]); renderApp('today')
}

/* ════════════ MAIN APP ════════════ */
let tab='today'
function appShell(inner,active){ return `<div class="hud"><div class="logo">${logoSvg()}BackSignal</div><div class="pts">${icon('spark',14)} ${S.points}</div></div>
  <div class="scroll app" id="scroll">${inner}</div>
  <div class="tabbar">${[['today','home','Home'],['rewards','rewards','Rewards'],['profile','profile','Profile']].map(([k,i,l])=>`<button data-tab="${k}" class="${active===k?'on':''}">${icon(i,21)}${l}</button>`).join('')}</div>` }
function renderApp(t){ if(t&&t!==tab)habitsEdit=false; tab=t||tab
  root.innerHTML=appShell(tab==='today'?viewToday():tab==='plan'?viewPlan():tab==='rewards'?viewRewards():viewProfile(),tab)
  animKids(); root.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>renderApp(b.dataset.tab))
  if(tab==='today')initToday(); else if(tab==='plan')initPlan(); else if(tab==='rewards')initRewards(); else initProfile()
  applyLang()
}
function firstName(){ return (S.profile.name||'').split(' ')[0]||'there' }
function greetWord(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening'}
function habitStatus(k,v){ const tgt=TARGETS[k]
  if(k==='sitting')return{ok:v<=tgt,pct:Math.min(100,(tgt/Math.max(v,1))*100),col:v<=tgt?'var(--green)':v<=tgt+2?'var(--amber)':'var(--red)'}
  const pct=Math.min(100,v/tgt*100);return{ok:v>=tgt,pct,col:v>=tgt?'var(--green)':pct>=55?'var(--amber)':'var(--red)'} }

function dateTitle(ds){ if(ds===todayStr())return 'Today'; const d=new Date(ds+'T00:00:00'); return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}) }
function last7(){ const a=[]; for(let i=6;i>=0;i--){const ds=dstr(addDays(-i)); a.push({ds,...(S.entries[ds]||{})})} return a }
function calCells(){ const base=new Date(calMonth+'-01T00:00:00'),y=base.getFullYear(),m=base.getMonth(),days=new Date(y,m+1,0).getDate(),off=new Date(y,m,1).getDay(),cells=[]; for(let i=0;i<off;i++)cells.push(null); for(let d=1;d<=days;d++)cells.push(new Date(y,m,d)); return cells }
function viewToday(){ const p=S.profile,sv=severity(p.sssScore),units={sitting:'h',walking:'min',exercise:'min',sleep:'h'}
  const t=S.entries[selDate]||{}, hasEntry=!!S.entries[selDate], ed=habitsEdit
  const monthLbl=new Date(calMonth+'-01T00:00:00').toLocaleDateString(undefined,{month:'long',year:'numeric'})
  return `<div class="greet">${greetWord()}<b>${firstName()}, protect your lower back</b></div>
    <div class="scorecard"><div class="mini"><svg width="78" height="78" viewBox="0 0 120 120" style="transform:rotate(-90deg)"><circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="12"/><circle cx="60" cy="60" r="50" fill="none" stroke="${sv.color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="${314-(p.sssScore/11)*314}"/></svg><div class="n" style="color:${sv.color}">${p.sssScore}</div></div><div class="info"><b>Spine Severity Score</b><div class="band" style="color:${sv.color}">${sv.band}</div><p>${sv.mgmt}</p></div></div>
    <div class="card"><div class="cardhd"><h3>${icon('book',15,'ci')} Spine diary</h3><div class="calnav"><button id="calPrev" aria-label="Previous month">‹</button><span>${monthLbl}</span><button id="calNext" aria-label="Next month">›</button></div></div>
      <div class="cal-wk">${['S','M','T','W','T','F','S'].map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="cal-grid">${calCells().map(c=>{ if(!c)return '<div class="cal-d empty"></div>'; const ds=dstr(c),fut=ds>todayStr(),has=!!S.entries[ds]; return `<button class="cal-d${ds===selDate?' sel':''}${ds===todayStr()?' today':''}${has?' has':''}${fut?' fut':''}" ${fut?'disabled':''} data-d="${ds}">${c.getDate()}${has?'<i></i>':''}</button>` }).join('')}</div></div>
    <div class="card"><div class="cardhd"><h3>${icon('walk',15,'ci')} ${dateTitle(selDate)}${S.device&&selDate===todayStr()&&!ed?' · '+S.device:''}</h3>${ed?`<span class="lnk" style="background:none;border:0;color:var(--mut2)">Entry</span>`:(hasEntry?`<button class="lnk" id="habEdit">${icon('edit',13)} Edit</button>`:'')}</div>
      ${(hasEntry||ed)
        ? ['sitting','walking','exercise','sleep'].map(k=>{const nm=k[0].toUpperCase()+k.slice(1),goal='Goal '+(k==='sitting'?'≤':'≥')+TARGETS[k]+' '+units[k]
            if(ed)return `<div class="habit editing"><div class="pic"><img src="${POSE[k]}" alt=""/></div><div class="hb"><div class="top"><b>${nm}</b></div><div class="hedit-row"><input id="hin_${k}" type="number" inputmode="decimal" step="${HRANGE[k].step}" min="0" max="${HRANGE[k].max}" value="${t[k]??''}"/><span class="un">${units[k]}</span></div><div class="goal">${goal}</div></div></div>`
            const st=habitStatus(k,t[k]||0)
            return `<div class="habit"><div class="pic"><img src="${POSE[k]}" alt=""/></div><div class="hb"><div class="top"><b>${nm}</b><span class="v"><b>${t[k]}</b> ${units[k]}</span></div><div class="bar"><i style="width:${st.pct}%;background:${st.col}"></i></div><div class="goal">${st.ok?icon('check',12)+' Goal met':goal}</div></div><button class="hedit" id="he_${k}" aria-label="Edit ${nm}">${icon('edit',15)}</button></div>`}).join('')
        : `<div class="emptyday">${icon('edit',24,'ci')}<p>No entry for ${dateTitle(selDate)} yet.</p></div>`}
      ${ed
        ? `<div style="display:flex;gap:9px;margin-top:12px"><button class="cta" id="habSave" style="flex:1">${icon('check',16)} Save entry</button><button class="cta sec" id="habCancel" style="margin-top:0;flex:none;width:auto;padding:0 18px">Cancel</button></div>`
        : (hasEntry
            ? (S.device&&selDate===todayStr()?`<button class="cta sec" id="sync" style="margin-top:12px">${S.lastSync===todayStr()?icon('check',16)+' Synced today · re-sync':icon('walk',16)+' Sync from '+S.device}</button>`:'')
            : `<button class="cta sec" id="habAdd" style="margin-top:12px">${icon('edit',16)} Add ${selDate===todayStr()?'today’s':'this'} entry</button>`)}</div>`
  // NOTE: weekly insights (insightsCard) are intentionally NOT shown to the patient here —
  // surfacing trends biases behaviour. Data is collected silently; insights belong in the clinician/diagnosis view.
}
function insightsCard(){ const days=last7()
  const metrics=[['walking','Walking','min',TARGETS.walking,false],['sitting','Sitting','h',TARGETS.sitting,true],['sleep','Sleep','h',TARGETS.sleep,false],['exercise','Exercise','min',TARGETS.exercise,false]]
  const vals=k=>days.map(d=>d[k]).filter(v=>v!=null&&v!=='')
  const avg=k=>{const a=vals(k);return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length*10)/10:0}
  const goalDays=(k,tgt,low)=>days.filter(d=>{const v=d[k];return v!=null&&(low?v<=tgt:v>=tgt)}).length
  const trend=(k,low)=>{const a=vals(k);if(a.length<2)return'flat';const h=Math.ceil(a.length/2),rec=a.slice(-h).reduce((x,y)=>x+y,0)/h,old=a.slice(0,a.length-h).reduce((x,y)=>x+y,0)/Math.max(1,a.length-h);return(low?rec<old*0.97:rec>old*1.03)?'up':(low?rec>old*1.03:rec<old*0.97)?'down':'flat'}
  const logged=days.filter(d=>metrics.some(([k])=>d[k]!=null)).length
  const onTrack=days.filter(d=>metrics.filter(([k,,,tgt,low])=>{const v=d[k];return v!=null&&(low?v<=tgt:v>=tgt)}).length>=3).length
  const headline=avg('sitting')>TARGETS.sitting?`Sitting is your biggest risk — averaging <b>${avg('sitting')}h/day</b> against a ≤${TARGETS.sitting}h goal. Stand and move every 30 minutes.`
    :avg('walking')<TARGETS.walking?`Build your walking up — averaging <b>${avg('walking')} min/day</b> (goal ${TARGETS.walking}). Every extra walk eases lumbar stiffness.`
    :`Strong week — your lifestyle is actively protecting your spine. Keep the streak going.`
  return `<div class="card ins"><div class="cardhd"><h3>${icon('bolt',15,'ci')} This week’s insights</h3><span class="insbadge">${logged}/7 days logged</span></div>
    <div class="inssum"><b>${onTrack}</b> of 7 days on track <span>· 3+ habit goals met</span></div>
    ${metrics.map(([k,lbl,u,tgt,low])=>{const a=avg(k),max=Math.max(tgt*1.4,...days.map(d=>d[k]||0)),tr=trend(k,low),gd=goalDays(k,tgt,low)
      return `<div class="insrow"><div class="t"><span>${lbl}<em class="trend ${tr}">${tr==='up'?'▲ improving':tr==='down'?'▼ slipping':'→ steady'}</em></span><span>avg <b>${a}${u}</b> · ${gd}/7 on goal</span></div><div class="spark">${days.map(d=>{const v=d[k],met=v!=null&&(low?v<=tgt:v>=tgt),h=v==null?0:Math.max(8,Math.min(100,v/max*100));return `<i style="height:${h}%;background:${v==null?'rgba(255,255,255,.09)':met?'var(--green)':'var(--amber)'}"></i>`}).join('')}</div></div>`}).join('')}
    <div class="insight">${icon('spark',15,'ci')}<div>${headline}</div></div></div>`
}
function initToday(){
  // calendar: pick a date / change month
  root.querySelectorAll('.cal-d[data-d]').forEach(b=>{ if(b.disabled)return; b.onclick=()=>{ selDate=b.dataset.d; habitsEdit=false; renderApp('today') } })
  const cp=$('calPrev'); if(cp)cp.onclick=()=>{shiftMonth(-1);renderApp('today')}
  const cn=$('calNext'); if(cn)cn.onclick=()=>{shiftMonth(1);renderApp('today')}
  // habit entry for the selected date
  const enter=k=>{habitsEdit=true;habitFocus=k||null;renderApp('today')}
  const he=$('habEdit'); if(he)he.onclick=()=>enter()
  const ha=$('habAdd'); if(ha)ha.onclick=()=>enter()
  ;['sitting','walking','exercise','sleep'].forEach(k=>{const b=$('he_'+k);if(b)b.onclick=()=>enter(k)})
  const hca=$('habCancel'); if(hca)hca.onclick=()=>{habitsEdit=false;renderApp('today')}
  const hsv=$('habSave'); if(hsv)hsv.onclick=()=>{
    const e=S.entries[selDate]?{...S.entries[selDate]}:{}
    ;['sitting','walking','exercise','sleep'].forEach(k=>{const el=$('hin_'+k); if(!el)return; let n=parseFloat(el.value); if(isNaN(n))n=0; n=Math.max(0,Math.min(HRANGE[k].max,n)); e[k]=HRANGE[k].dec?Math.round(n*10)/10:Math.round(n)})
    S.entries[selDate]=e; if(selDate===todayStr())S.today=e
    habitsEdit=false; save(); award(0,'Entry saved'); renderApp('today') }
  if(habitsEdit){const f=$('hin_'+(habitFocus||'sitting')); if(f){f.focus();f.select&&f.select()} habitFocus=null}
  const sb=$('sync'); if(sb)sb.onclick=()=>{ const first=S.lastSync!==todayStr(),r=()=>Math.random()
    const e={sitting:Math.round(6+r()*5),walking:Math.round(25+r()*45),exercise:Math.round(r()*35),sleep:+(5.5+r()*2.5).toFixed(1)}
    S.entries[todayStr()]=e; S.today=e
    if(first){S.streak+=1;let g=20;['sitting','walking','exercise','sleep'].forEach(k=>{if(habitStatus(k,e[k]).ok)g+=25});S.lastSync=todayStr();S.points+=g;save();award(g,'Daily sync · '+S.streak+'-day streak',[innerWidth/2,innerHeight*0.5])}else save()
    renderApp('today') }
}

/* PLAN */
function planData(){ const p=S.profile,sv=severity(p.sssScore),t=S.today||{}
  const clinical={'LOW':{t:'Self-care plan',d:'Your score is low — keep it that way with good posture, daily movement and exercise. Re-check in about 4 weeks.'},'MILD–MODERATE':{t:'Physiotherapy + habit correction',d:'Begin guided physiotherapy and correct the daily habits below. Get a clinical evaluation if there’s no improvement in 2 weeks.'},'MODERATE–SEVERE':{t:'See a spine specialist',d:'Your score suggests a spine-specialist consultation for proper assessment and advanced care.'},'SEVERE / HIGH RISK':{t:'Urgent specialist care',d:'Seek urgent spine-specialist evaluation now — please don’t wait on this.'}}[sv.band]
  const acts=[];const add=(id,ic,title,why,met)=>acts.push({id,ic,title,why,met})
  if(t.sitting!=null)add('sit','sit','Stand or walk 2–3 min every 30 min','Prolonged sitting raises lumbar disc pressure, weakens the core and collapses posture.',t.sitting<=TARGETS.sitting)
  if(t.walking!=null)add('walk','walk','Build toward 45 minutes of walking a day','Low walking reduces spinal mobility and endurance.',t.walking>=TARGETS.walking)
  if(t.exercise!=null)add('ex','exercise','Core & back strengthening, 3×/week','Lack of exercise weakens the muscles that support the spine.',t.exercise>=TARGETS.exercise)
  if(t.sleep!=null)add('sleep','sleep','Aim for 7–8 hours of sleep','Poor sleep increases inflammation and delays recovery.',t.sleep>=TARGETS.sleep)
  const notes=[]; if((p.sciatica||0)>=2)notes.push('Leg pain or numbness: avoid prolonged bending and heavy strain. If it worsens or affects walking, see a specialist.'); if(p.chronicity==='chronic')notes.push('Pain lasting over 6 weeks responds better to a structured program than to rest — stay active within comfort.'); if((p.vas||0)>=7)notes.push('High pain right now: short-term relief plus gentle movement; avoid prolonged bed rest.')
  return{sv,clinical,acts,notes,redflag:hasRedFlag()} }
function viewPlan(){ const d=planData();S.planDone=S.planDone||[]
  return `<div class="eyebrow">Your next steps</div><h1 class="q" style="font-size:22px">A plan for your lower back</h1>
    ${d.redflag?`<div class="warn" style="margin-top:14px">${icon('shield',16)}<div>A red flag was indicated — please seek <b>urgent spine-specialist evaluation</b> before following the rest of this plan.</div></div>`:''}
    <div class="mgmt" style="background:${d.sv.color}14;border:1px solid ${d.sv.color}40;margin-top:14px"><b style="font-size:14.5px">${d.clinical.t}</b><div style="color:var(--mut);font-size:13px;margin-top:6px;line-height:1.5">${d.clinical.d}</div>${d.sv.band==='LOW'?'':`<button class="cta" id="findcare" style="margin-top:13px">${icon('stetho',16)} Find care / book</button>`}</div>
    <div class="card"><h3>${icon('check',15,'ci')} Correct your daily habits</h3>${d.acts.map(a=>{const done=S.planDone.includes(a.id),ok=a.met||done;return `<div class="flag ${ok?'on':''}" data-act="${a.id}" style="${a.met?'border-color:rgba(52,211,153,.35)':''};margin-top:9px"><span class="bx" style="${ok?'background:var(--green);border-color:var(--green)':''}">${ok?icon('check',13):''}</span><div style="flex:1"><div style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px">${icon(a.ic,16,'ci')}${a.title}</div><div style="font-size:11.5px;color:var(--mut2);margin-top:4px;line-height:1.45">${a.met?'You’re already on target — keep it up.':a.why}</div></div></div>`}).join('')}</div>
    ${d.notes.length?`<div class="card"><h3>${icon('plan',15,'ci')} Notes for your symptoms</h3>${d.notes.map(n=>`<p class="sub" style="margin-top:9px">• ${n}</p>`).join('')}</div>`:''}
    <div class="card" style="background:rgba(56,189,248,.06)"><p class="sub" style="margin-top:0;color:#c2d6ef">Most chronic back pain develops from unhealthy habits repeated daily. Early lifestyle correction can prevent long-term spine degeneration and disability.</p><div style="font-size:11px;color:var(--mut2);margin-top:8px">— ${APP.doctor}, Spine Severity System</div></div>
    <div class="trust" style="border:0"><a href="${APP.links.website}" target="_blank" rel="noopener">Website</a> · <a href="${APP.links.youtube}" target="_blank" rel="noopener">Exercise videos</a> · <a href="${APP.links.research}" target="_blank" rel="noopener">Research</a></div>`
}
function initPlan(){ S.planDone=S.planDone||[]; root.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>{const id=el.dataset.act,a=planData().acts.find(x=>x.id===id); if(!a||a.met||S.planDone.includes(id))return; S.planDone.push(id); save(); const r=el.getBoundingClientRect(); award(15,'Step committed',[r.left+r.width/2,r.top]); renderApp('plan')})
  const fc=$('findcare'); if(fc)fc.onclick=()=>window.open(APP.links.website,'_blank') }

/* REWARDS */
function viewRewards(){ return `<div class="ptbig"><b>${S.points}</b><span>BackSignal points</span></div><p class="sub" style="text-align:center">Earn points from your assessment, daily tasks and habit goals — redeem them for real rewards.</p>
  ${REWARDS.map(r=>{const got=S.redeemed.includes(r.id),can=S.points>=r.cost&&!got;return `<div class="reward ${got?'got':''}"><div class="ic2">${icon(r.ic,21)}</div><div class="rb"><b>${r.name}</b><span>${r.desc}</span></div><button class="rc" data-rw="${r.id}" ${(!can&&!got)?'disabled':''}>${got?icon('check',14)+' Done':r.cost+' '+icon('spark',12)}</button></div>`}).join('')}
  <div class="disc">Rewards are illustrative for this prototype.</div>` }
function initRewards(){ root.querySelectorAll('[data-rw]').forEach(b=>b.onclick=()=>{const r=REWARDS.find(x=>x.id===b.dataset.rw); if(S.redeemed.includes(r.id)||S.points<r.cost)return; S.points-=r.cost; S.redeemed.push(r.id); save(); const rr=b.getBoundingClientRect(); award(0,'Redeemed: '+r.name,[rr.left,rr.top]); renderApp('rewards')}) }

/* PROFILE */
function viewProfile(){ const p=S.profile,sv=severity(p.sssScore)
  return `<div class="card" style="margin-top:8px"><h3>${icon('profile',15,'ci')} ${p.name||'Your profile'}</h3><div class="bd" style="margin-top:10px">
    <div class="b"><span class="n">Age · Sex</span><span class="v">${p.age} · ${p.sex||'–'}</span></div>
    <div class="b"><span class="n">BMI</span><span class="v">${bmiOf(p.weight,p.height).toFixed(1)}</span></div>

    <div class="b"><span class="n">Health device</span><span class="v">${S.device||'Not connected'}</span></div>
    <div class="b"><span class="n">Tasks completed</span><span class="v">${S.tasksDone||0}</span></div>
    <div class="b"><span class="n">Assessed</span><span class="v">${p.completedAt}</span></div></div></div>
    <div class="trust" style="border:0"><span class="by">${icon('shield',13)} Verified by ${APP.doctor}</span><br/>Dept. of Spine Surgery — Spine Severity System (SSS)<br/><a href="${APP.links.website}" target="_blank" rel="noopener">Website</a> · <a href="${APP.links.youtube}" target="_blank" rel="noopener">Videos</a> · <a href="${APP.links.research}" target="_blank" rel="noopener">Research</a></div>
    <div class="card"><div class="lrow" id="langRow"><div class="hb"><b>${icon('globe',17,'ci')} Language</b><span>${langData().name}</span></div>${icon('arrow',16)}</div></div>

    <div class="disc">Screening & decision support only — not a diagnosis or a substitute for clinical judgment.</div>` }
function initProfile(){ const lr=$('langRow'); if(lr)lr.onclick=openLangSheet
  $('retake').onclick=()=>{ D={name:S.profile.name,age:S.profile.age,sex:S.profile.sex,occupation:S.profile.occupation,height:S.profile.height,weight:S.profile.weight,vas:null,sciatica:null,odi:{Walking:0,Sitting:0,Standing:0,Sleep:0,'Daily activities':0},chronicity:null,redflags:[],habits:{sitting:8,walking:30,exercise:2,sleep:7}}; watched={}; STEPS.forEach(s=>s._auto=false); idx=STEPS.findIndex(s=>s.id==='vas'); renderStep() }
  $('reset').onclick=()=>{localStorage.removeItem(KEY);location.reload()} }

document.body.insertAdjacentHTML('beforeend',`<div id="splash"><div class="sp-logo">${logoSvg().replace('width="22" height="22"','width="64" height="64"')}</div><div class="sp-word">BackSignal</div><div class="sp-sub">Spine Severity System</div></div>`)
setTimeout(()=>{ const sp=$('splash'); if(sp)sp.remove() },2600)
