<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BackSignal — Your Personal Spine Severity Score</title>
<meta name="description" content="BackSignal — a doctor-verified lower-back (lumbar) severity screening based on the Spine Severity System by Dr Ayush Sharma." />
<meta name="theme-color" content="#02030a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BackSignal" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2302030a'/%3E%3Cg fill='%236fe0ff'%3E%3Crect x='9' y='3' width='6' height='2.4' rx='1.2'/%3E%3Crect x='8.4' y='6.4' width='7.2' height='2.6' rx='1.3'/%3E%3Crect x='8.1' y='9.8' width='7.8' height='2.7' rx='1.35'/%3E%3Crect x='8.1' y='13.2' width='7.8' height='2.7' rx='1.35'/%3E%3Crect x='9' y='16.8' width='6' height='2.5' rx='1.25' fill='%23ffb020'/%3E%3Crect x='9' y='20' width='6' height='2.4' rx='1.2' fill='%23ffb020'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg0:#02030a; --bg1:#061b3a; --bg2:#08284f;
    --ink:#eaf2ff; --mut:#9fc0e8; --mut2:#6f93bd; --line:rgba(120,180,255,.16);
    --cyan:#5fd0ff; --blue:#38bdf8; --indigo:#818cf8; --gold:#ffb020;
    --green:#34d399; --amber:#fbbf24; --orange:#fb923c; --red:#f87171;
    --card:rgba(8,20,40,.62);
  }
  html,body{height:100%}
  body{
    font-family:'Sora',system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(125% 80% at 50% 4%, var(--bg2) 0%, var(--bg1) 34%, #020c1e 64%, var(--bg0) 100%);
    overflow:hidden;
  }
  /* phone frame for desktop preview; full-bleed on real phones */
  #app{position:relative;width:100%;max-width:430px;height:100dvh;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
  ::-webkit-scrollbar{width:0;height:0}

  /* ── HUD ── */
  .hud{flex:none;padding:16px 20px 10px;display:flex;align-items:center;gap:10px}
  .hud .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;letter-spacing:.2px}
  .hud .logo svg{filter:drop-shadow(0 0 8px rgba(95,208,255,.5))}
  .hud .cert{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--cyan);background:rgba(56,189,248,.1);border:1px solid rgba(95,208,255,.28);padding:4px 9px;border-radius:99px;font-weight:600}
  .prog{flex:none;height:3px;margin:0 20px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  .prog i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--indigo));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .steplbl{flex:none;padding:8px 20px 0;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);display:flex;justify-content:space-between}

  /* ── scroll body ── */
  .scroll{flex:1;overflow-y:auto;padding:6px 20px 150px;-webkit-overflow-scrolling:touch}
  .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan);font-weight:600;margin-top:8px}
  h1.q{font-size:24px;font-weight:600;line-height:1.18;margin-top:6px;letter-spacing:-.2px}
  p.sub{font-size:13.5px;color:var(--mut);line-height:1.5;margin-top:8px}
  .lumbar{color:var(--gold);font-weight:600}

  /* ── footer CTA ── */
  .foot{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, var(--bg0) 55%, transparent);}
  .cta{width:100%;border:0;border-radius:16px;padding:16px;font-family:inherit;font-size:15.5px;font-weight:700;color:#02121f;cursor:pointer;
    background:linear-gradient(120deg,var(--cyan),var(--indigo));display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,filter .2s}
  .cta:active{transform:scale(.985)} .cta:disabled{opacity:.4}
  .cta.sec{background:transparent;color:var(--mut);border:1px solid var(--line);margin-top:9px}
  .back{position:absolute;top:16px;right:20px;background:0;border:0;color:var(--mut2);font-size:12px;cursor:pointer;z-index:5}

  /* ── video card / player ── */
  .vcard{margin-top:16px;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 13px;cursor:pointer;transition:border-color .2s}
  .vcard:active{border-color:var(--cyan)}
  .vcard .thumb{position:relative;width:50px;height:64px;flex:none;border-radius:10px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0,#0d3a6e,#04132b)}
  .vcard .thumb .pl{position:absolute;inset:0;display:grid;place-items:center;font-size:15px;color:#fff}
  .vcard .meta b{display:block;font-size:13px;font-weight:600}
  .vcard .meta span{font-size:11px;color:var(--mut2)}
  .vcard .yt{margin-left:auto;font-size:9px;letter-spacing:1px;color:var(--mut2);text-transform:uppercase}

  .pmask{position:fixed;inset:0;z-index:40;background:rgba(2,8,20,.82);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:18px}
  .pmask.show{display:flex}
  .pwrap{width:100%;max-width:300px}
  .pscreen{position:relative;width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;background:radial-gradient(120% 80% at 50% 6%,#0d3a6e,#04132b 72%);border:1px solid var(--line)}
  .pscreen iframe{width:100%;height:100%;border:0;display:block}
  .pscreen .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 22px}
  .pscreen .ph .spineimg{width:54px;opacity:.8;margin-bottom:14px;filter:drop-shadow(0 0 18px rgba(95,208,255,.5))}
  .pscreen .ph .pt{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
  .pscreen .ph h3{font-size:17px;font-weight:600;margin:6px 0 10px}
  .pscreen .ph p{font-size:12.5px;color:#c2d6ef;line-height:1.55}
  .pscreen .playbtn{position:absolute;inset:0;display:grid;place-items:center;background:rgba(3,12,28,.35);cursor:pointer}
  .pscreen .playbtn .b{width:62px;height:62px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:23px;color:#06224a;box-shadow:0 8px 30px rgba(95,208,255,.5)}
  .pbar{height:3px;border-radius:99px;background:rgba(255,255,255,.14);margin:12px 2px 0;overflow:hidden}.pbar i{display:block;height:100%;width:0;background:var(--cyan)}
  .pclose{margin-top:12px}

  /* ── inputs ── */
  .field{margin-top:14px}
  .field label{font-size:12px;color:var(--mut);letter-spacing:.3px}
  .field input,.field select{width:100%;margin-top:6px;background:rgba(10,26,50,.6);border:1px solid var(--line);border-radius:13px;padding:13px 14px;color:#fff;font-family:inherit;font-size:15px;outline:none}
  .field input:focus,.field select:focus{border-color:var(--cyan)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chips{display:grid;gap:9px;margin-top:14px}
  .chips.two{grid-template-columns:1fr 1fr}
  .chip{border:1px solid var(--line);background:rgba(12,28,54,.6);color:#cfe0f5;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .16s}
  .chip b{display:block;font-size:11.5px;color:var(--mut2);font-weight:500;margin-top:3px}
  .chip.on{border-color:var(--cyan);background:linear-gradient(135deg,rgba(56,189,248,.2),rgba(56,189,248,.04));color:#fff}
  .chip.on b{color:var(--cyan)}

  /* VAS faces */
  .faces{display:flex;justify-content:space-between;gap:6px;margin-top:18px}
  .face{flex:1;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:14px;padding:10px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
  .face svg{width:30px;height:30px}
  .face span{font-size:12px;font-weight:600;color:var(--mut)}
  .face.on{transform:translateY(-3px)}
  .vaslbl{text-align:center;margin-top:14px;font-size:14px;font-weight:600}

  /* ODI grid */
  .odi{margin-top:16px;display:grid;gap:8px}
  .odirow{display:grid;grid-template-columns:1.1fr 2fr;align-items:center;gap:10px}
  .odirow .n{font-size:13.5px;color:#dbe8fa}
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .seg button{border:1px solid var(--line);background:rgba(12,28,54,.55);color:var(--mut);border-radius:10px;padding:9px 2px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .14s}
  .seg button.on{color:#02121f}
  .seg button.g.on{background:var(--green);border-color:var(--green)}
  .seg button.a.on{background:var(--amber);border-color:var(--amber)}
  .seg button.r.on{background:var(--red);border-color:var(--red);color:#fff}
  .odisum{margin-top:12px;text-align:center;font-size:12.5px;color:var(--mut)}

  /* red flags */
  .flags{margin-top:14px;display:grid;gap:7px}
  .flag{display:flex;align-items:center;gap:11px;border:1px solid var(--line);background:rgba(12,28,54,.5);border-radius:12px;padding:11px 13px;cursor:pointer;font-size:13px;transition:all .15s}
  .flag .bx{width:20px;height:20px;flex:none;border-radius:6px;border:1.5px solid var(--mut2);display:grid;place-items:center;font-size:12px;color:#02121f}
  .flag.on{border-color:var(--red);background:rgba(248,113,113,.12)} .flag.on .bx{background:var(--red);border-color:var(--red)}
  .warn{margin-top:12px;display:flex;gap:9px;align-items:flex-start;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);border-radius:13px;padding:12px 13px;font-size:12px;color:#ffd2d2;line-height:1.5}

  /* readout tag */
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;margin-top:12px}

  /* device cards */
  .dev{display:flex;align-items:center;gap:13px;border:1px solid var(--line);background:rgba(12,28,54,.55);border-radius:14px;padding:14px;cursor:pointer;margin-top:10px;transition:all .15s}
  .dev:active{transform:scale(.99)} .dev .di{font-size:22px;width:30px;text-align:center}
  .dev b{font-size:14px} .dev span{font-size:11.5px;color:var(--mut2);display:block;margin-top:1px}
  .dev .arr{margin-left:auto;color:var(--mut2)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .synced{display:flex;align-items:center;gap:6px;color:var(--green);font-size:12.5px;font-weight:600;margin:14px 0 4px}
  .srow{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}
  .srow .k{color:var(--mut)} .srow .v{color:#fff;font-weight:600}

  /* habit sliders */
  .hsl{margin-top:16px}
  .hsl .top{display:flex;justify-content:space-between;align-items:baseline}
  .hsl .top b{font-size:22px;font-weight:700} .hsl .top span{font-size:12px;color:var(--mut)}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:99px;outline:none;margin-top:10px;background:linear-gradient(90deg,var(--cyan) var(--p,0%),rgba(255,255,255,.1) var(--p,0%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(95,208,255,.7);cursor:pointer}

  /* hero spine */
  .hero{position:relative;display:flex;justify-content:center;margin:6px 0 2px}
  .hero img{height:300px;width:auto;filter:drop-shadow(0 10px 40px rgba(0,40,90,.6))}
  .hero .lumglow{position:absolute;left:50%;top:54%;width:140px;height:120px;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle,var(--gold),transparent 62%);opacity:.55;filter:blur(6px);mix-blend-mode:screen;transition:background .5s,opacity .5s}

  /* results */
  .ring{display:grid;place-items:center;position:relative;margin:8px 0}
  .ring .num{position:absolute;text-align:center}
  .ring .num b{font-size:46px;font-weight:800;letter-spacing:-1px}
  .ring .num span{display:block;font-size:9.5px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-top:-2px}
  .ring .num small{display:block;font-size:11px;color:var(--mut2)}
  .mgmt{margin-top:14px;border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.5}
  .bd{margin-top:14px;display:grid;gap:6px}
  .bd .b{display:flex;align-items:center;font-size:12.5px;gap:10px}
  .bd .b .n{flex:1;color:var(--mut)} .bd .b .v{color:#fff;font-weight:600}
  .trust{margin-top:18px;text-align:center;font-size:11.5px;color:var(--mut2);line-height:1.6;border-top:1px solid var(--line);padding-top:14px}
  .trust a{color:var(--cyan);text-decoration:none}
  .trust .by{color:#fff;font-weight:600}
  .disc{margin-top:10px;font-size:10.5px;color:var(--mut2);text-align:center;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden><g fill="#6fe0ff"><rect x="9" y="3" width="6" height="2.4" rx="1.2"/><rect x="8.4" y="6.4" width="7.2" height="2.6" rx="1.3"/><rect x="8.1" y="9.8" width="7.8" height="2.7" rx="1.35"/><rect x="8.1" y="13.2" width="7.8" height="2.7" rx="1.35"/></g><g fill="#ffb020"><rect x="9" y="16.8" width="6" height="2.5" rx="1.25"/><rect x="9" y="20" width="6" height="2.4" rx="1.2"/></g></svg>
      BackSignal
    </div>
    <div class="cert">✚ Doctor-verified</div>
  </div>
  <div class="prog"><i id="prog"></i></div>
  <div class="steplbl"><span id="lblL"></span><span id="lblR"></span></div>
  <div class="scroll" id="scroll"></div>
  <div class="foot" id="foot"></div>
</div>

<!-- video player -->
<div class="pmask" id="pmask">
  <div class="pwrap">
    <div class="pscreen" id="pscreen"></div>
    <div class="pbar"><i id="pbar"></i></div>
    <button class="cta sec pclose" id="pclose">Close</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   BackSignal — Personal Spine Severity Score
   Grounded in: Spine Severity Assessment System (SSS), a 6-step lumbar
   (lower-back) screening tool — Dr Ayush Sharma, Dept. of Spine Surgery.
   Lower-back / lumbar focus only. Daily-habit snapshot is informational.
   ════════════════════════════════════════════════════════════════ */

const APP = {
  doctor: 'Dr Ayush Sharma',
  // Paste YouTube IDs here when ready — empty id shows the script placeholder.
  // Record vertical (9:16) clips; intro 30–45s, step clips ~15–25s.
  videos: {
    intro:     { id:'', title:'Why your lower back matters', secs:40,
      script:'Most lower-back pain is built slowly — by how you sit, move and sleep every day. In two minutes, BackSignal turns your habits and symptoms into one Spine Severity Score, so you know whether to self-care, see a physio, or get checked.' },
    vas:       { id:'', title:'Rating your pain', secs:18,
      script:'Pain is the body’s signal. Pick the face that matches your lower back today — it anchors how we read everything else.' },
    sciatica:  { id:'', title:'Leg pain & sciatica', secs:20,
      script:'Pain, tingling or numbness travelling down the leg can mean a nerve is irritated in the lower back. How far and how often it travels tells us a lot.' },
    odi:       { id:'', title:'How it affects your day', secs:22,
      script:'We measure disability the way spine clinics do — how much pain limits walking, sitting, standing, sleep and daily activities (a Modified Oswestry index).' },
    bmi:       { id:'', title:'Body load on the spine', secs:16,
      script:'Extra body weight increases the mechanical load on lumbar discs. Your BMI adds a small, evidence-based weighting to the score.' },
    chronicity:{ id:'', title:'How long it’s lasted', secs:16,
      script:'Pain that lingers past six weeks behaves differently to a fresh strain. Duration changes what we recommend.' },
    redflag:   { id:'', title:'A quick safety check', secs:18,
      script:'A few symptoms can signal something serious that needs urgent care. We always screen for these red flags before giving a score.' },
  },
  links: { website:'https://example.com', research:'https://example.com', youtube:'https://youtube.com' },
}

const D = {
  age:35, sex:'', occupation:'',
  height:170, weight:72,
  vas:null, sciatica:null,
  odi:{ Walking:0, Sitting:0, Standing:0, Sleep:0, 'Daily activities':0 },
  chronicity:null, redflags:[],
  habits:{ sitting:8, walking:30, exercise:2, sleep:7 }, device:null,
}

/* ── SSS scoring (exact to the chart) ───────────────────────────── */
const bmi = () => D.weight / Math.pow(D.height/100, 2)
const bmiScore = () => { const b=bmi(); return b<25?0 : b<30?1 : 2 }
const vasPoints = () => D.vas==null?0 : D.vas<=3?0 : D.vas<=6?1 : 2
const odiTotal = () => Object.values(D.odi).reduce((a,b)=>a+b,0)        // 0–10
const odiPoints = () => { const t=odiTotal(); return t<=2?0 : t<=5?1 : 2 }
const chronScore = () => ({acute:0,subacute:1,chronic:2})[D.chronicity] ?? 0
const hasRedFlag = () => D.redflags.length>0
function sssTotal(){ return hasRedFlag() ? 11 : vasPoints() + (D.sciatica||0) + odiPoints() + bmiScore() + chronScore() }
function severity(t){
  if (hasRedFlag() || t>=10) return { band:'SEVERE / HIGH RISK', color:'var(--red)', hex:'#f87171',
    desc:'Severe symptoms with possible serious pathology.', mgmt:'Urgent spine-specialist evaluation / advanced care.' }
  if (t>=7) return { band:'MODERATE–SEVERE', color:'var(--orange)', hex:'#fb923c',
    desc:'Moderate-to-severe pain and disability; marked limitation.', mgmt:'Spine specialist consultation and advanced care.' }
  if (t>=4) return { band:'MILD–MODERATE', color:'var(--amber)', hex:'#fbbf24',
    desc:'Mild-to-moderate pain with some functional limitation.', mgmt:'Physiotherapy, lifestyle correction and evaluation.' }
  return { band:'LOW', color:'var(--green)', hex:'#34d399',
    desc:'Minimal pain and low impact on your day.', mgmt:'Education, posture correction and regular exercise.' }
}

/* ── daily-habit snapshot (informational only) — SSS lifestyle tracker ── */
function habitRisk(){
  const {sitting,walking,exercise,sleep}=D.habits
  let pts=0
  pts += sitting<6?0 : sitting<=9?1 : 2
  pts += walking>=45?0 : walking>=20?1 : 2
  pts += exercise>=3?0 : exercise>=1?1 : 2
  pts += (sleep>=7&&sleep<=8)?0 : sleep>=5?1 : 2
  if (pts<=2) return {label:'LOW lifestyle risk', color:'var(--green)'}
  if (pts<=5) return {label:'MODERATE lifestyle risk', color:'var(--amber)'}
  return {label:'HIGH lifestyle risk', color:'var(--red)'}
}

/* ── video player ───────────────────────────────────────────────── */
const pmask=document.getElementById('pmask'), pscreen=document.getElementById('pscreen'),
  pbar=document.getElementById('pbar'), pclose=document.getElementById('pclose')
let ptimer=null
function videoCard(key){
  const v=APP.videos[key]; const m=Math.floor(v.secs/60), s=String(v.secs%60).padStart(2,'0')
  return `<div class="vcard" data-vid="${key}">
    <div class="thumb"><div class="pl">▶</div></div>
    <div class="meta"><b>${v.title}</b><span>Why we ask · ${m}:${s}</span></div>
    <div class="yt">▶ Video</div></div>`
}
function openVideo(key){
  const v=APP.videos[key]; clearInterval(ptimer); pbar.style.width='0%'
  if (v.id){
    pscreen.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
    pbar.style.width='100%'
  } else {
    pscreen.innerHTML = `<div class="ph">
        <img class="spineimg" src="assets/stand.webp" alt="" />
        <div class="pt">${APP.doctor} · Spine Lab</div><h3>${v.title}</h3><p>${v.script}</p>
      </div>
      <div class="playbtn" id="pplay"><div class="b">▶</div></div>`
    const play=document.getElementById('pplay')
    play.onclick=()=>{ play.style.display='none'; let p=0
      ptimer=setInterval(()=>{ p+=0.1; const f=Math.min(1,p/v.secs); pbar.style.width=f*100+'%'; if(f>=1)clearInterval(ptimer) },100) }
  }
  pmask.classList.add('show')
}
pclose.onclick=()=>{ clearInterval(ptimer); pmask.classList.remove('show') }

/* ── faces (VAS) ────────────────────────────────────────────────── */
function face(v){
  const cols=['#34d399','#7dd37d','#fbbf24','#fb923c','#f87171','#ef4444']
  const i=v/2, c=cols[i]
  const mouth = v<=2?'M8 16q4 3 8 0' : v<=4?'M8 16h8' : v<=6?'M8 17q4 -1 8 0' : 'M8 18q4 -4 8 0'
  const brow = v>=8?'<path d="M6 8l4 2M18 8l-4 2" stroke="'+c+'" stroke-width="1.6" stroke-linecap="round"/>':''
  return `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="${c}" stroke-width="1.8"/><circle cx="8.5" cy="10" r="1.1" fill="${c}"/><circle cx="15.5" cy="10" r="1.1" fill="${c}"/><path d="${mouth}" stroke="${c}" stroke-width="1.8" stroke-linecap="round" fill="none"/>${brow}</svg>`
}

/* ── flow engine ────────────────────────────────────────────────── */
let idx=0
const scroll=document.getElementById('scroll'), foot=document.getElementById('foot')
function setFoot(){
  const s=STEPS[idx]; const label=typeof s.cta==='function'?s.cta():s.cta
  const disabled = s.canNext && !s.canNext()
  foot.innerHTML=`<button class="cta" id="cta" ${disabled?'disabled':''}>${label} ${s.result?'↻':'→'}</button>`
  document.getElementById('cta').onclick=()=>{ if(disabled)return; goTo(s.next) }
}
function render(){
  const s=STEPS[idx]
  document.getElementById('prog').style.width=(s.prog*100)+'%'
  document.getElementById('lblL').textContent=s.label[0]; document.getElementById('lblR').textContent=s.label[1]
  scroll.innerHTML=(s.back?'<button class="back" id="bk">‹ Back</button>':'')+s.render()
  scroll.scrollTop=0
  if(s.back)document.getElementById('bk').onclick=()=>{ idx=Math.max(0,idx-1); render() }
  scroll.querySelectorAll('[data-vid]').forEach(el=>el.onclick=()=>openVideo(el.dataset.vid))
  s.init&&s.init()
  setFoot()
}
function goTo(id){ const i=STEPS.findIndex(s=>s.id===id); if(i>=0){ idx=i; render() } }
render()
</script>
